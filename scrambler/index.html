<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Scrambler</title>
  <meta name="description" content="Paste JSON and scramble values in a type-preserving way. Strings become fake names, numbers stay in the same range. Exclude specific keys to keep them intact.">
  <meta name="theme-color" content="#040714">
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #040714;
      --surface-1: rgba(255,255,255,0.025);
      --surface-2: rgba(255,255,255,0.05);
      --border-subtle: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.1);
      --text-primary: #f9f9f9;
      --text-secondary: #cacaca;
      --text-muted: rgba(255,255,255,0.45);
      --accent: #0063e5;
      --accent-bright: #0080ff;
      --danger: #ef4444;
      --success: #10b981;
      --font: 'Avenir Next', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header-bar {
      background: linear-gradient(135deg, #B015B0 0%, #3D0080 45%, #080010 100%);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 0 24px;
      height: 68px;
      z-index: 100;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .header-logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .header-logo-img {
      height: 36px; width: auto; flex-shrink: 0;
      filter: brightness(0) invert(1);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: block;
    }
    .header-logo-img:hover { transform: scale(1.14) rotate(-9deg); }
    .header-logo h1 { font-size: 1.2em; font-weight: 600; letter-spacing: 0.5px; }
    .header-subtitle { font-size: 0.82em; color: rgba(255,255,255,0.72); font-weight: 500; margin-top: 3px; }
    .header-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .header-home {
      display: flex; align-items: center; padding: 5px;
      color: rgba(255,255,255,0.9); text-decoration: none; border-radius: 6px;
      transition: color .2s, background .2s; flex-shrink: 0;
    }
    .header-home:hover { color: #fff; background: rgba(255,255,255,0.12); }
    .header-home svg { width: 34px; height: 34px; display: block; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 16px; border-radius: 7px;
      font-size: 0.875rem; font-family: var(--font); font-weight: 500;
      cursor: pointer; border: none;
      transition: background 0.15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-bright); }
    .btn-ghost {
      background: rgba(255,255,255,0.08); color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.14); }
    .btn-sm { padding: 5px 12px; font-size: 0.82rem; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Main layout ── */
    .main {
      flex: 1;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── Panels row ── */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 900px) {
      .panels { grid-template-columns: 1fr; }
    }

    /* ── Cards ── */
    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .card-title {
      font-size: 0.78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    /* ── Textareas ── */
    .json-area {
      width: 100%;
      min-height: 320px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 8px;
      outline: none;
      resize: vertical;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text-primary);
      padding: 14px;
      line-height: 1.6;
      transition: border-color 0.15s;
    }
    .json-area:focus { border-color: var(--accent); }
    .json-area::placeholder { color: var(--text-muted); }
    .json-area[readonly] {
      color: var(--text-secondary);
      cursor: default;
    }

    .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── Controls card ── */
    .controls-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px 24px;
    }
    .controls-inner {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: flex-start;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 200px;
    }
    .control-label {
      font-size: 0.78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--text-muted);
    }
    .exclude-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-primary);
      font-family: var(--font-mono); font-size: 0.8rem;
      padding: 8px 12px;
      outline: none;
      resize: none;
      min-height: 60px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    .exclude-input:focus { border-color: var(--accent); }
    .exclude-input::placeholder { color: var(--text-muted); font-family: var(--font); font-size: 0.8rem; }
    .control-hint { font-size: 0.75rem; color: var(--text-muted); }

    .checkboxes { display: flex; flex-direction: column; gap: 10px; }
    .checkbox-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.875rem; color: var(--text-secondary);
      cursor: pointer; user-select: none;
    }
    .checkbox-row input[type="checkbox"] {
      width: 15px; height: 15px; cursor: pointer;
      accent-color: var(--accent);
    }

    .controls-footer {
      margin-top: 16px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }

    /* ── Error ── */
    .error-msg {
      color: var(--danger); font-size: 0.85rem;
      padding: 10px 14px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 7px;
      display: none;
    }
    .error-msg.visible { display: block; }

    /* ── Status chip ── */
    .status-chip {
      font-size: 0.8rem; padding: 4px 10px; border-radius: 20px;
      font-weight: 500; display: none;
    }
    .status-chip.visible { display: inline-flex; align-items: center; gap: 5px; }
    .status-ok { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.25); }

    .hidden-el { display: none !important; }
  </style>
</head>

<!-- ── Main ── -->
<div class="main">

  <!-- Panels -->
  <div class="panels">

    <!-- Input -->
    <div class="card">
      <div class="card-title">Input JSON</div>
      <textarea class="json-area" id="json-input"
        placeholder="Paste your JSON here…&#10;&#10;Strings → fake names/words&#10;Numbers → same-magnitude random values&#10;Object keys are never changed"></textarea>

      <div class="card-actions">
        <label class="btn btn-ghost btn-sm" for="file-input">

      <textarea class="json-area" id="json-output" readonly placeholder="Scrambled JSON will appear here…"></textarea>
      <div class="card-actions">
        <button class="btn btn-ghost btn-sm" id="btn-copy" disabled>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
          Copy
        </button>
        <button class="btn btn-ghost btn-sm" id="btn-download" disabled>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>

        <span class="status-chip status-ok hidden-el" id="copy-chip">Copied!</span>
        <button class="btn btn-primary btn-sm hidden-el" id="btn-open-viewer" style="margin-left:auto;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Open in Viewer
        </button>
      </div>
    </div>

  </div>

  <!-- Controls -->
  <div class="controls-card">
    <div class="controls-inner">

      <div class="control-group" style="flex: 2; min-width: 260px;">
        <label class="control-label" for="exclude-input">Exclude keys (keep original values)</label>
        <textarea class="exclude-input" id="exclude-input"
          placeholder="name, id, history.6m.tickets"></textarea>
        <span class="control-hint">Exact key name or dot-path. Comma or newline separated. Applied at every nesting level.</span>
      </div>

      <div class="control-group">
        <div class="control-label">Options</div>
        <div class="checkboxes">
          <label class="checkbox-row">
            <input type="checkbox" id="opt-seeded">
            Consistent scramble (same input → same output)
          </label>
          <label class="checkbox-row">
            <input type="checkbox" id="opt-scale">
            Preserve numeric scale (within ±50%)
          </label>
        </div>
      </div>

    </div>
    <div class="controls-footer">
      <button class="btn btn-primary" id="btn-scramble">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
          <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
        </svg>
        Scramble JSON
      </button>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────────────────────
// Seeded PRNG — mulberry32
// ─────────────────────────────────────────────────────────────
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function hashStr(s) {
  let h = 0x811c9dc5;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 0x01000193);
  }
  return h >>> 0;
}

// ─────────────────────────────────────────────────────────────
// Name pools
// ─────────────────────────────────────────────────────────────
const NAMES_FIRST = [
  'Alice','Bob','Carol','Dave','Eve','Frank','Grace','Hank','Ivy','Jack',
  'Karen','Leo','Mia','Nate','Olive','Paul','Quinn','Rosa','Sam','Tara',
  'Uma','Vince','Wren','Xena','Yara','Zoe','Aiden','Blake','Casey','Dana',
  'Eliot','Fiona','Glen','Hana','Ivan','Julia','Kyle','Luna','Marc','Nina',
  'Oscar','Petra','Remy','Sara','Troy','Ursa','Vera','Wade','Xavi','Yuki',
  'Zara','Axel','Bree','Cloe','Dean','Ella','Felix','Gina','Hugo','Iris',
  'Joel','Kira','Lars','Maya','Noah','Ora','Piers','Rae','Seth','Tia',
  'Ugo','Val','Will','Xia','Yves','Zed','Ana','Ben','Cora','Dex'
];
const NAMES_LAST = [
  'Smith','Jones','Brown','Davis','Clark','Lewis','Hall','Young','King','Scott',
  'Green','Baker','Adams','Nelson','Carter','Evans','Turner','Parker','Collins','Edwards',
  'Morris','Rogers','Reed','Cook','Bell','Murphy','Bailey','Rivera','Cooper','Cox',
  'Ward','Torres','Gray','James','Watson','Brooks','Price','Bennett','Wood','Barnes',
  'Ross','Henderson','Coleman','Jenkins','Perry','Powell','Long','Patterson','Hughes','Flores',
  'Washington','Butler','Simmons','Foster','Gonzalez','Bryant','Alexander','Russell','Griffin','Diaz',
  'Hayes','Myers','Ford','Hamilton','Graham','Sullivan','Wallace','West','Cole','Jordan'
];
const WORDS = [
  'alpha','bravo','charlie','delta','echo','foxtrot','golf','hotel','india','juliet',
  'kilo','lima','mike','november','oscar','papa','quebec','romeo','sierra','tango',
  'uniform','victor','whiskey','xray','yankee','zulu','cyber','data','echo','flux',
  'grid','hawk','iris','jade','keen','lux','mono','nova','optic','proto',
  'quark','relay','sigma','tidal','ultra','vortex','warp','xenon','yield','zenith'
];

// ─────────────────────────────────────────────────────────────
// Scrambler core
// ─────────────────────────────────────────────────────────────
function parseExcludeKeys(raw) {
  return raw.split(/[\n,]/).map(s => s.trim()).filter(Boolean);
}

function isExcluded(key, path, excludeKeys) {
  for (const ex of excludeKeys) {
    if (ex === key) return true;              // exact key match
    if (ex === path) return true;             // exact dot-path match
    if (path.endsWith('.' + ex)) return true; // key at any depth
  }
  return false;
}

function scrambleValue(val, rng, opts, path) {
  if (val === null) return null;

  const type = typeof val;

  if (type === 'boolean') return rng() < 0.5;

  if (type === 'number') {
    if (opts.preserveScale) {
      // Within ±50% of original
      const factor = 0.5 + rng();
      const result = val * factor;
      if (Number.isInteger(val)) return Math.round(result);
      const dec = (String(val).split('.')[1] || '').length;
      return parseFloat(result.toFixed(dec));
    }
    if (Number.isInteger(val)) {
      // Same sign, random int in [0, max(|val|*2, 10)]
      const mag = Math.max(Math.abs(val) * 2, 10);
      const r = Math.floor(rng() * (mag + 1));
      return val >= 0 ? r : -r;
    }
    // Float
    const absVal = Math.abs(val);
    if (absVal <= 1.0) {
      // Ratio/percentage-like [0,1]
      const r = parseFloat(rng().toFixed(4));
      return val >= 0 ? r : -r;
    }
    const mag = Math.max(absVal * 2, 10);
    const dec = (String(val).split('.')[1] || '').length;
    const r = parseFloat((rng() * mag).toFixed(dec));
    return val >= 0 ? r : -r;
  }

  if (type === 'string') {
    // Email pattern
    if (/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
      const rand = Math.floor(rng() * 1e6).toString(36);
      return `fake_${rand}@example.com`;
    }
    // URL pattern
    if (/^https?:\/\//i.test(val)) {
      const rand = Math.floor(rng() * 1e6).toString(36);
      return `https://example.com/${rand}`;
    }
    const len = val.length;
    if (len <= 5) {
      // Short: random same-length lowercase letters
      let s = '';
      for (let i = 0; i < len; i++) s += String.fromCharCode(97 + Math.floor(rng() * 26));
      return s;
    }
    if (len <= 12) {
      // Medium: fake first name
      return NAMES_FIRST[Math.floor(rng() * NAMES_FIRST.length)];
    }
    // Long: first + last name
    const first = NAMES_FIRST[Math.floor(rng() * NAMES_FIRST.length)];
    const last  = NAMES_LAST[Math.floor(rng() * NAMES_LAST.length)];
    return `${first} ${last}`;
  }

  if (Array.isArray(val)) {
    return val.map((item, i) => scrambleDeep(item, rng, opts, `${path}[${i}]`));
  }

  if (type === 'object') {
    return scrambleDeep(val, rng, opts, path);
  }

  return val;
}

function scrambleDeep(obj, rng, opts, path) {
  if (obj === null) return null;
  if (Array.isArray(obj)) {
    return obj.map((item, i) => scrambleDeep(item, rng, opts, `${path}[${i}]`));
  }
  if (typeof obj !== 'object') {
    return scrambleValue(obj, rng, opts, path);
  }

  const result = {};
  for (const [key, val] of Object.entries(obj)) {
    const childPath = path ? `${path}.${key}` : key;
    if (isExcluded(key, childPath, opts.excludeKeys)) {
      result[key] = val; // preserve original
    } else if (val !== null && typeof val === 'object') {
      result[key] = scrambleDeep(val, rng, opts, childPath);
    } else {
      result[key] = scrambleValue(val, rng, opts, childPath);
    }
  }
  return result;
}

function scramble(parsed, opts) {
  let rng;
  if (opts.seeded) {
    const seed = hashStr(JSON.stringify(parsed));
    rng = mulberry32(seed);
  } else {
    rng = Math.random.bind(Math);
  }
  return scrambleDeep(parsed, rng, opts, '');
}

// ─────────────────────────────────────────────────────────────
// Demo data
// ─────────────────────────────────────────────────────────────
const DEMO = {
  "users": [
    {
      "id": 1,
      "name": "Alice Hoffman",
      "email": "alice@company.com",
      "active": true,
      "score": 87.4,
      "tags": ["admin", "reviewer"],
      "address": {
        "city": "Springfield",
        "country": "US"
      }
    },
    {
      "id": 2,
      "name": "Bob Tanaka",
      "email": "bob@company.com",
      "active": false,
      "score": 52.1,
      "tags": ["viewer"],
      "address": {
        "city": "Shelbyville",
        "country": "US"
      }
    }
  ],
  "meta": {
    "total": 2,
    "generated_at": "2026-01-15"
  }
};

// ─────────────────────────────────────────────────────────────
// UI
// ─────────────────────────────────────────────────────────────
const inputEl    = document.getElementById('json-input');
const outputEl   = document.getElementById('json-output');
const errorEl    = document.getElementById('error-msg');
const btnCopy    = document.getElementById('btn-copy');
const btnDl      = document.getElementById('btn-download');
const copyChip   = document.getElementById('copy-chip');

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.classList.add('visible');
}
function clearError() {
  errorEl.classList.remove('visible');
}

const btnOpenViewer = document.getElementById('btn-open-viewer');

function setOutput(text) {
  outputEl.value = text;
  btnCopy.disabled = !text;
  btnDl.disabled   = !text;
  if (text) btnOpenViewer.classList.remove('hidden-el');
  else btnOpenViewer.classList.add('hidden-el');
}

document.getElementById('btn-example').addEventListener('click', () => {
  inputEl.value = JSON.stringify(DEMO, null, 2);
  clearError();
  setOutput('');
});

document.getElementById('btn-scramble').addEventListener('click', () => {
  clearError();
  const raw = inputEl.value.trim();
  if (!raw) { showError('Please paste JSON first.'); return; }

  let parsed;
  try { parsed = JSON.parse(raw); }
  catch (e) { showError('Invalid JSON: ' + e.message); return; }

  const opts = {
    excludeKeys:   parseExcludeKeys(document.getElementById('exclude-input').value),
    seeded:        document.getElementById('opt-seeded').checked,
    preserveScale: document.getElementById('opt-scale').checked,
  };

  const result = scramble(parsed, opts);
  setOutput(JSON.stringify(result, null, 2));
});

document.getElementById('btn-copy').addEventListener('click', () => {
  navigator.clipboard.writeText(outputEl.value).then(() => {
    copyChip.classList.remove('hidden-el');
    copyChip.classList.add('visible');
    setTimeout(() => {
      copyChip.classList.remove('visible');
      copyChip.classList.add('hidden-el');
    }, 1800);
  });
});

document.getElementById('btn-download').addEventListener('click', () => {
  const blob = new Blob([outputEl.value], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'scrambled.json';
  a.click();
  URL.revokeObjectURL(url);
});

btnOpenViewer.addEventListener('click', () => {
  try { sessionStorage.setItem('viewer-import', outputEl.value); } catch (e) {}
  window.open('../viewer/', '_blank');
});

document.getElementById('file-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => { inputEl.value = ev.target.result; clearError(); setOutput(''); };
  reader.readAsText(file);
  e.target.value = '';
});
</script>
</body>
