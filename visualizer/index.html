<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; frame-ancestors 'none'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Visualizer</title>
  <meta name="description" content="Paste JSON and explore records in a searchable table with live stats, filters, and pivot views">
  <meta name="theme-color" content="#040714">
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<a class="skip-link" href="#main">Skip to content</a>
<!-- ── Header ── -->
<header class="header-bar">
  <div class="header-logo">
    <a href="https://ehq.cl/" target="_blank" rel="noopener noreferrer">
      <img src="../energon-classic-logo.png" class="header-logo-img" alt="Energon">
    </a>
    <div>
      <h1>JSON Visualizer</h1>
      <div class="header-subtitle">Explore, filter, and pivot any JSON dataset</div>
    </div>
  </div>
  <div class="header-actions">
    <a href="../" class="btn btn-ghost" style="text-decoration:none" title="Build JSON with drag-and-drop blocks">Builder</a>
    <a href="../scrambler/" class="btn btn-ghost" style="text-decoration:none" title="Anonymise JSON for safe sharing">Scrambler</a>
    <button id="btn-new-json" class="btn btn-ghost hidden-el" title="Clear and load new JSON">Load JSON</button>
    <a href="https://neorgon.com/" class="header-home" title="Neorgon home" aria-label="Neorgon home">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </a>
  </div>
</header>

<!-- ── Input View ── -->
<main id="main">
<div id="view-input">
  <div class="input-card">
    <div class="input-title">Paste JSON or drop a file</div>
    <div class="drop-zone" id="drop-zone">
      <textarea id="json-input" placeholder="Paste JSON here…&#10;&#10;Supported shapes:&#10;  [ { … }, … ]                      Flat array of records&#10;  { &quot;GROUP&quot;: { &quot;key&quot;: [ … ] } }   Grouped records"></textarea>
    </div>
    <div id="error-msg" class="error-msg"></div>
    <div class="input-row">
      <label class="file-label" for="file-input">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Upload File
      </label>
      <input type="file" id="file-input" accept=".json,application/json">
      <button class="btn btn-primary" id="btn-load">Load →</button>
    </div>
    <div class="input-example">
      Try an example:
      <div class="example-buttons" id="example-buttons"></div>
    </div>
  </div>
</div>

<!-- ── Viewer View ── -->
<div id="view-viewer">
  <div class="search-bar" id="search-bar">
    <div class="search-wrap">
      <span class="search-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <input type="text" id="search-input" placeholder="Search records…">
      <button class="btn-regex" id="btn-regex" title="Toggle regex search">.*</button>
    </div>
    <span class="match-count" id="match-count"></span>
    <span class="filter-badge hidden-el" id="filter-badge"></span>
    <button class="btn btn-ghost btn-sm hidden-el" id="btn-collapse-all">Collapse All</button>
    <button class="btn btn-ghost btn-sm hidden-el" id="btn-export-csv">CSV</button>
    <button class="btn btn-ghost btn-sm hidden-el" id="btn-sparklines">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="2" y="14" width="4" height="6" rx="1"/><rect x="9" y="9" width="4" height="11" rx="1"/><rect x="16" y="4" width="4" height="16" rx="1"/></svg>
      Bars
    </button>
    <button class="btn btn-ghost btn-sm hidden-el" id="btn-heat">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2C8 2 6 6 6 10c0 3.5 2 6 4 8l1 1 1-1c2-2 5-4.5 5-8 0-4-2-8-5-8z"/></svg>
      Heat
    </button>
    <div class="cols-dropdown-wrap">
      <button class="btn btn-ghost btn-sm hidden-el" id="btn-columns">Columns ▾</button>
      <div class="cols-dropdown hidden-el" id="cols-dropdown"></div>
    </div>
    <button class="btn btn-pivot-toggle hidden-el" id="btn-pivot">Pivot</button>
    <span class="pivot-hint hidden-el" id="pivot-hint">Pivot by user and metric to see values across groups.</span>
  </div>
  <div class="pivot-toolbar hidden-el" id="pivot-toolbar">
    <button class="btn btn-ghost btn-sm" id="btn-exit-pivot">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Table
    </button>
    <span style="width:1px;height:20px;background:var(--border);flex-shrink:0;"></span>
    <span class="pivot-toolbar-label">User</span>
    <select class="pivot-select" id="pivot-user-select"></select>
    <span class="pivot-toolbar-label">Metric</span>
    <select class="pivot-select" id="pivot-metric-select"></select>
    <span style="width:1px;height:20px;background:var(--border);flex-shrink:0;margin-left:4px;"></span>
    <button class="btn-chart-toggle" id="btn-chart-toggle">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Timeline
    </button>
    <button class="btn-ghost btn btn-sm hidden-el" id="btn-period-order">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
      <span id="btn-period-order-label">1m → 12m</span>
    </button>
  </div>
  <div class="filter-bar hidden-el" id="filter-bar"></div>
  <div class="viewer-body">
    <div class="table-area" id="table-area">
      <table id="data-table">
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
      <table class="pivot-table hidden-el" id="pivot-table">
        <thead id="pivot-table-head"></thead>
        <tbody id="pivot-table-body"></tbody>
      </table>
      <div class="timeline-area hidden-el" id="timeline-area"></div>
    </div>
    <aside class="stats-sidebar" id="stats-sidebar"></aside>
  </div>
</div>

<!-- ── Record Modal ── -->
<div id="record-modal" class="modal-backdrop hidden-el" role="dialog" aria-modal="true">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" id="modal-close" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer hidden-el" id="modal-footer"></div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</main>
</body>
</html>
