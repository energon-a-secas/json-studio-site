<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Viewer</title>
  <meta name="description" content="Paste or upload JSON and explore records as a searchable nested table with live aggregate stats.">
  <meta name="theme-color" content="#040714">
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #040714;
      --surface-1: rgba(255,255,255,0.025);
      --surface-2: rgba(255,255,255,0.05);
      --border-subtle: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.1);
      --text-primary: #f9f9f9;
      --text-secondary: #cacaca;
      --text-muted: rgba(255,255,255,0.45);
      --accent: #0063e5;
      --accent-bright: #0080ff;
      --danger: #ef4444;
      --success: #10b981;
      --warning: #f59e0b;
      --font: 'Avenir Next', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header-bar {
      background: linear-gradient(135deg, #B015B0 0%, #3D0080 45%, #080010 100%);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 0 24px;
      height: 68px;
      z-index: 100;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .header-logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .header-logo-img {
      height: 36px; width: auto; flex-shrink: 0;
      filter: brightness(0) invert(1);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: block;
    }
    .header-logo-img:hover { transform: scale(1.14) rotate(-9deg); }
    .header-logo h1 { font-size: 1.2em; font-weight: 600; letter-spacing: 0.5px; }
    .header-subtitle { font-size: 0.82em; color: rgba(255,255,255,0.72); font-weight: 500; margin-top: 3px; }
    .header-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }

    /* ── Home icon ── */
    .header-home {
      display: flex; align-items: center; padding: 5px;
      color: rgba(255,255,255,0.9); text-decoration: none; border-radius: 6px;
      transition: color .2s, background .2s; flex-shrink: 0;
    }
    .header-home:hover { color: #fff; background: rgba(255,255,255,0.12); }
    .header-home svg { width: 34px; height: 34px; display: block; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 16px; border-radius: 7px;
      font-size: 0.875rem; font-family: var(--font); font-weight: 500;
      cursor: pointer; border: none;
      transition: background 0.15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-bright); }
    .btn-ghost {
      background: rgba(255,255,255,0.08); color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.14); }

    /* ── Input View ── */
    #view-input {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      overflow-y: auto;
    }

    .input-card {
      width: 100%;
      max-width: 720px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .input-title { font-size: 1.1rem; font-weight: 600; }

    .drop-zone {
      border: 2px dashed rgba(255,255,255,0.15);
      border-radius: 10px;
      background: rgba(255,255,255,0.02);
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(0,99,229,0.08);
    }

    #json-input {
      width: 100%;
      min-height: 240px;
      background: transparent;
      border: none;
      outline: none;
      resize: vertical;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: var(--text-primary);
      padding: 16px;
      line-height: 1.6;
    }
    #json-input::placeholder { color: var(--text-muted); }

    .input-row { display: flex; align-items: center; gap: 12px; }

    .file-label {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 16px; border-radius: 7px;
      font-size: 0.875rem; font-weight: 500;
      cursor: pointer;
      background: rgba(255,255,255,0.08); color: var(--text-primary);
      border: 1px solid var(--border);
      transition: background 0.15s; user-select: none;
    }
    .file-label:hover { background: rgba(255,255,255,0.14); }
    #file-input { display: none; }

    .input-example {
      font-size: 0.82rem;
      color: var(--text-muted);
      text-align: center;
    }
    .btn-example {
      background: none; border: none; cursor: pointer;
      color: var(--accent); font-size: 0.82rem;
      font-family: var(--font); padding: 0;
      text-decoration: underline; text-underline-offset: 2px;
    }
    .btn-example:hover { color: var(--accent-bright); }

    .error-msg {
      color: var(--danger); font-size: 0.85rem;
      padding: 10px 14px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 7px;
      display: none;
    }
    .error-msg.visible { display: block; }

    /* ── Viewer View ── */
    #view-viewer {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    #view-viewer.active { display: flex; }

    .search-bar {
      padding: 12px 24px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .search-wrap { position: relative; flex: 1; }
    .search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted); pointer-events: none;
    }
    #search-input {
      width: 100%;
      padding: 9px 12px 9px 36px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: var(--font); font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    #search-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.07); }
    #search-input::placeholder { color: var(--text-muted); }

    .match-count { font-size: 0.82rem; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
    .match-count.has-matches { color: var(--text-secondary); }

    /* ── Main layout ── */
    .viewer-body { display: flex; flex: 1; overflow: hidden; min-height: 0; }

    .table-area { flex: 1; overflow: auto; }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }

    thead {
      position: sticky; top: 0; z-index: 10;
      background: #0b0918;
    }
    thead th {
      padding: 10px 14px;
      text-align: left; font-weight: 600;
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    thead th.col-num { text-align: right; }

    /* Group rows */
    .row-group {
      cursor: pointer;
      background: rgba(255,255,255,0.04);
      user-select: none;
    }
    .row-group:hover { background: rgba(255,255,255,0.07); }
    .row-group td {
      padding: 10px 14px;
      font-weight: 600; font-size: 0.82rem;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border-subtle);
    }
    .group-name { display: flex; align-items: center; gap: 8px; }
    .group-chevron {
      width: 16px; height: 16px; flex-shrink: 0;
      transition: transform 0.18s;
      color: var(--text-muted);
    }
    .group-chevron.collapsed { transform: rotate(-90deg); }
    .group-badge {
      font-size: 0.72rem; font-weight: 500;
      background: rgba(255,255,255,0.1);
      padding: 2px 7px; border-radius: 10px;
      color: var(--text-muted);
    }

    /* Data rows */
    .row-data td {
      padding: 8px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--text-secondary);
    }
    .row-data { cursor: pointer; }
    .row-data:hover td { background: rgba(255,255,255,0.05); }
    .row-data.hidden { display: none; }
    .row-data td.col-num {
      text-align: right;
      font-family: var(--font-mono); font-size: 0.82rem;
    }

    mark {
      background: rgba(245,158,11,0.35);
      color: inherit; border-radius: 2px; padding: 0 1px;
    }

    /* ── Stats Sidebar ── */
    .stats-sidebar {
      width: 280px; flex-shrink: 0;
      border-left: 1px solid var(--border-subtle);
      overflow-y: auto;
      padding: 16px;
      display: flex; flex-direction: column; gap: 14px;
    }

    .stats-section-title {
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); margin-bottom: 6px;
    }

    .stats-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px; padding: 12px 14px;
    }

    .stats-col-name {
      font-size: 0.8rem; font-weight: 600;
      color: var(--text-primary); margin-bottom: 8px;
      word-break: break-all;
    }

    .stats-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 3px 0; font-size: 0.8rem;
    }
    .stats-label { color: var(--text-muted); }
    .stats-value { font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-secondary); }

    .percent-indicator {
      margin-top: 8px; padding: 6px 10px;
      border-radius: 6px; font-size: 0.78rem; font-weight: 500;
    }
    .percent-ok  { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.25); }
    .percent-low { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.25); }
    .percent-hi  { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.25); }

    .group-stat-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.8rem; padding: 4px 0;
    }
    .group-stat-name { color: var(--text-secondary); font-size: 0.78rem; word-break: break-all; }
    .group-stat-count {
      font-family: var(--font-mono); font-size: 0.75rem;
      color: var(--text-muted);
      background: rgba(255,255,255,0.07);
      padding: 1px 7px; border-radius: 10px; flex-shrink: 0; margin-left: 6px;
    }

    .hidden-el { display: none !important; }

    /* ── Nested object badge ── */
    .nested-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 4px;
      font-size: 0.75rem; font-family: var(--font); font-weight: 500;
      background: rgba(124,58,237,0.15); color: #a78bfa;
      border: 1px solid rgba(124,58,237,0.3);
      cursor: pointer; user-select: none;
      transition: background 0.15s;
    }
    .nested-badge:hover { background: rgba(124,58,237,0.28); }

    /* ── Wide modal variant for nested data ── */
    .modal-box.modal-wide { max-width: 860px; }
    .modal-period-cell {
      font-family: var(--font-mono); font-size: 0.8rem;
      color: var(--text-muted); white-space: nowrap;
    }
    .modal-project-cell {
      color: var(--text-primary); font-weight: 600; white-space: nowrap;
    }
    .modal-project-gap {
      color: transparent; border-bottom: none !important;
    }

    /* ── Period filter pills (inside nested modal) ── */
    .nested-filter-bar {
      padding: 12px 16px 8px;
      display: flex; gap: 6px; flex-wrap: wrap;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .nested-filter-pill {
      padding: 4px 13px; border-radius: 20px;
      font-size: 0.78rem; font-weight: 500; font-family: var(--font);
      cursor: pointer; border: 1px solid var(--border);
      background: rgba(255,255,255,0.05); color: var(--text-muted);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .nested-filter-pill:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
    .nested-filter-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── Totals row inside nested table ── */
    .nested-totals-row td {
      border-top: 1px solid var(--border) !important;
      background: rgba(255,255,255,0.04);
      font-weight: 700; color: var(--text-primary);
    }

    /* ── Distribution section below filtered table ── */
    .nested-summary {
      padding: 12px 16px 14px;
      border-top: 1px solid var(--border-subtle);
    }
    .nested-summary-title {
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); margin-bottom: 8px;
    }
    .nested-dist-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 5px 0; font-size: 0.8rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .nested-dist-row:last-child { border-bottom: none; }
    .nested-dist-metric {
      color: var(--text-muted); min-width: 140px; flex-shrink: 0;
      font-size: 0.78rem; padding-top: 3px;
    }
    .nested-dist-values { display: flex; flex-wrap: wrap; gap: 6px; }
    .nested-dist-chip {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 5px; padding: 2px 9px;
      font-size: 0.78rem; color: var(--text-secondary);
    }
    .nested-dist-chip strong { color: var(--text-primary); margin-left: 4px; }

    /* ── Pivot Toggle Button ── */
    .btn-pivot-toggle {
      background: rgba(255,255,255,0.08); color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .btn-pivot-toggle:hover { background: rgba(255,255,255,0.14); }
    .btn-pivot-toggle.active {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }

    /* ── Pivot Toolbar ── */
    .pivot-toolbar {
      padding: 10px 24px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0; flex-wrap: wrap;
    }
    .pivot-toolbar-label {
      font-size: 0.78rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-muted);
    }
    .pivot-select {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-primary);
      font-family: var(--font); font-size: 0.875rem;
      padding: 7px 12px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .pivot-select:focus { border-color: var(--accent); background: rgba(255,255,255,0.07); }
    .pivot-select option { background: #0d0a1a; }

    /* ── Pivot Table ── */
    .pivot-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    .pivot-table thead {
      position: sticky; top: 0; z-index: 10;
      background: #0b0918;
    }
    .pivot-table thead th {
      padding: 10px 14px;
      text-align: left; font-weight: 600;
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .pivot-table thead th.col-num { text-align: right; }
    .pivot-table td {
      padding: 9px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--text-secondary);
    }
    .pivot-table td.col-num {
      text-align: right;
      font-family: var(--font-mono); font-size: 0.82rem;
    }
    .pivot-table td.col-missing {
      text-align: right;
      font-family: var(--font-mono); font-size: 0.82rem;
      color: var(--text-muted);
    }
    .pivot-table tr.pivot-totals-row {
      background: rgba(255,255,255,0.04);
    }
    .pivot-table tr.pivot-totals-row td {
      font-weight: 700;
      color: var(--text-primary);
      border-top: 1px solid var(--border);
    }
    .pivot-table td.col-total {
      text-align: right;
      font-family: var(--font-mono); font-size: 0.82rem;
      font-weight: 600; color: var(--text-primary);
    }

    /* ── Record Modal ── */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .modal-box {
      background: #0d0a1a;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      width: 100%; max-width: 600px;
      max-height: 82vh;
      display: flex; flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .modal-title { font-size: 1.05rem; font-weight: 600; }
    .modal-close {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); padding: 4px; border-radius: 5px;
      display: flex; align-items: center;
      transition: color 0.15s, background 0.15s;
    }
    .modal-close:hover { color: var(--text-primary); background: rgba(255,255,255,0.08); }
    .modal-body { overflow-y: auto; }
    .modal-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    .modal-table thead th {
      padding: 10px 16px; text-align: left;
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-muted);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: #0b0918; position: sticky; top: 0;
    }
    .modal-table thead th.col-num { text-align: right; }
    .modal-table td {
      padding: 9px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: var(--text-secondary);
    }
    .modal-table tbody tr:last-child td { border-bottom: none; }
    .modal-table td.col-num { text-align: right; font-family: var(--font-mono); font-size: 0.82rem; }
    .modal-table td.group-cell { color: var(--text-primary); font-weight: 500; }
    .modal-table td.kv-key {
      color: var(--text-muted); font-size: 0.75rem;
      text-transform: uppercase; letter-spacing: 0.05em; width: 40%;
    }
    .modal-footer {
      padding: 14px 20px; border-top: 1px solid rgba(255,255,255,0.08);
      display: flex; flex-wrap: wrap; gap: 10px;
      flex-shrink: 0; background: rgba(255,255,255,0.02);
    }
    .modal-stat {
      display: flex; flex-direction: column; gap: 3px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 7px; padding: 8px 12px;
    }
    .modal-stat-label { font-size: 0.7rem; color: var(--text-muted); }
    .modal-stat-value { font-family: var(--font-mono); font-size: 0.88rem; font-weight: 600; }
    .pct-ok  { color: #34d399; }
    .pct-low { color: #fbbf24; }
    .pct-hi  { color: #f87171; }
  </style>
</head>
<body>

<!-- ── Header ── -->
<div class="header-bar">
  <div class="header-logo">
    <a href="https://ehq.cl/" target="_blank" rel="noopener noreferrer">
      <img src="../energon-classic-logo.png" class="header-logo-img" alt="Energon">
    </a>
    <div>
      <h1>Dynamic Viewer</h1>
      <div class="header-subtitle">JSON explorer with live stats</div>
    </div>
  </div>
  <div class="header-actions">
    <a href="../" class="btn btn-ghost" style="text-decoration:none">JSON Builder</a>
    <a href="../scrambler/" class="btn btn-ghost" style="text-decoration:none">Scrambler</a>
    <button id="btn-new-json" class="btn btn-ghost hidden-el">Load new JSON</button>
    <a href="https://neorgon.com/" class="header-home" title="neorgon.com" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </a>
  </div>
</div>

<!-- ── Input View ── -->
<div id="view-input">
  <div class="input-card">
    <div class="input-title">Paste or drop a JSON file</div>
    <div class="drop-zone" id="drop-zone">
      <textarea id="json-input" placeholder="Paste JSON here…&#10;&#10;Supported shapes:&#10;  [ { … }, … ]                      — flat array of records&#10;  { &quot;GROUP&quot;: { &quot;key&quot;: [ … ] } }   — grouped records"></textarea>
    </div>
    <div id="error-msg" class="error-msg"></div>

// ─────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────
let _structure        = null; // { mode, groups, columns }
let _pivotConfig      = null; // { identifierField, pivotField, periodKeys, metrics } | null
let _pivotActive      = false;
let _nestedModalState = null; // { matchingRows, isObjOfObjs, sortedPeriods, metricList }

// ─────────────────────────────────────────────────────────────
// Utilities
// ─────────────────────────────────────────────────────────────
function escHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function fmt(n) {
  if (Number.isInteger(n)) return n.toLocaleString();
  return n.toLocaleString(undefined, { maximumFractionDigits: 2 });
}

// ─────────────────────────────────────────────────────────────
// Structure Detection
// ─────────────────────────────────────────────────────────────
function detectStructure(parsed) {
  let groups = [];
  let mode;

  if (Array.isArray(parsed)) {
    mode = 'flat';
    groups = [{ name: null, rows: parsed.filter(r => r && typeof r === 'object' && !Array.isArray(r)) }];
  } else if (parsed && typeof parsed === 'object') {
    mode = 'grouped';
    const topKeys = Object.keys(parsed);

    // Find the shared array key from the first group
    let arrayKey = null;
    for (const k of topKeys) {
      const val = parsed[k];
      if (val && typeof val === 'object' && !Array.isArray(val)) {
        arrayKey = Object.keys(val).find(ik => Array.isArray(val[ik])) || null;
        if (arrayKey) break;
      }
    }

    for (const k of topKeys) {
      const val = parsed[k];
      let rows = [];
      if (Array.isArray(val)) {
        rows = val.filter(r => r && typeof r === 'object' && !Array.isArray(r));
      } else if (val && typeof val === 'object') {
        if (arrayKey && Array.isArray(val[arrayKey])) {
          rows = val[arrayKey].filter(r => r && typeof r === 'object' && !Array.isArray(r));
        } else {
          // Fallback: first array property
          const firstArr = Object.values(val).find(v => Array.isArray(v));
          rows = firstArr ? firstArr.filter(r => r && typeof r === 'object' && !Array.isArray(r)) : [];
        }
      }
      groups.push({ name: k, rows });
    }
  } else {
    throw new Error('JSON must be an array or an object at the root level.');
  }

  // Collect columns: union of all field names across all rows
  const fieldSet = new Set();
  for (const g of groups) {
    for (const row of g.rows) {
      for (const k of Object.keys(row)) fieldSet.add(k);
    }
  }

  // Infer type: 'number', 'nested' (object), or 'string'
  const columns = [];
  for (const name of fieldSet) {
    let isNum = true;
    let isNested = false;
    for (const g of groups) {
      for (const row of g.rows) {
        const v = row[name];
        if (v !== null && v !== undefined) {
          if (typeof v === 'object' && !Array.isArray(v)) isNested = true;
          if (typeof v !== 'number') isNum = false;
        }
      }
    }
    columns.push({ name, type: isNested ? 'nested' : (isNum ? 'number' : 'string') });
  }

  return { mode, groups, columns };
}

// ─────────────────────────────────────────────────────────────
// Pivot Detection
// ─────────────────────────────────────────────────────────────
function detectPivotConfig(parsed) {
  // Requires grouped mode
  if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) return null;

  const topKeys = Object.keys(parsed);
  if (topKeys.length === 0) return null;

  // Collect a sample of rows from all groups
  let sampleRows = [];
  for (const topKey of topKeys) {
    const val = parsed[topKey];
    if (!val || typeof val !== 'object' || Array.isArray(val)) return null;
    // Find the array within each group
    const arrayKey = Object.keys(val).find(k => Array.isArray(val[k]));
    if (!arrayKey) return null;
    for (const row of val[arrayKey]) {
      if (row && typeof row === 'object' && !Array.isArray(row)) sampleRows.push(row);
    }
  }
  if (sampleRows.length === 0) return null;

  // Find a pivot field: a field whose values are objects of objects (period → metrics)
  let pivotField = null;
  let periodKeys = null;
  let metrics = null;

  for (const fieldName of Object.keys(sampleRows[0])) {
    const vals = sampleRows.map(r => r[fieldName]).filter(v => v !== null && v !== undefined);
    if (vals.length === 0) continue;
    // Check if every non-null value is an object of objects
    const isObjOfObjs = vals.every(v =>
      v && typeof v === 'object' && !Array.isArray(v) &&
      Object.values(v).every(inner => inner && typeof inner === 'object' && !Array.isArray(inner))
    );
    if (!isObjOfObjs) continue;

    // Gather all period keys across all rows
    const allPeriods = new Set();
    for (const v of vals) for (const p of Object.keys(v)) allPeriods.add(p);
    if (allPeriods.size === 0) continue;

    // Gather numeric metric keys from sub-objects
    const numericMetrics = new Set();
    for (const v of vals) {
      for (const periodObj of Object.values(v)) {
        for (const [mk, mv] of Object.entries(periodObj)) {
          if (typeof mv === 'number') numericMetrics.add(mk);
        }
      }
    }
    if (numericMetrics.size === 0) continue;

    pivotField = fieldName;
    // Sort period keys by numeric prefix
    periodKeys = [...allPeriods].sort((a, b) => {
      const na = parseInt(a.match(/^(\d+)/)?.[1] ?? '0', 10);
      const nb = parseInt(b.match(/^(\d+)/)?.[1] ?? '0', 10);
      return na - nb;
    });
    metrics = [...numericMetrics];
    break;
  }

  if (!pivotField) return null;

  // Find an identifier field by name heuristic
  const nameHeuristics = ['name', 'user', 'username'];
  let identifierField = null;
  for (const h of nameHeuristics) {
    if (sampleRows[0] && h in sampleRows[0] && typeof sampleRows[0][h] === 'string') {
      identifierField = h;
      break;
    }
  }
  if (!identifierField) {
    // Fall back to first string column
    for (const key of Object.keys(sampleRows[0] || {})) {
      if (typeof sampleRows[0][key] === 'string') { identifierField = key; break; }
    }
  }
  if (!identifierField) return null;

  return { identifierField, pivotField, periodKeys, metrics };
}

// ─────────────────────────────────────────────────────────────
// Pivot UI
// ─────────────────────────────────────────────────────────────
function renderPivotToolbar(pivotConfig) {
  const { identifierField, metrics } = pivotConfig;
  const { groups } = _structure;

  // Collect all user values across all groups
  const userSet = new Set();
  for (const group of groups) {
    for (const row of group.rows) {
      if (row[identifierField] !== undefined && row[identifierField] !== null) {
        userSet.add(String(row[identifierField]));
      }
    }
  }
  const users = [...userSet].sort((a, b) => a.localeCompare(b));

  const userSel = document.getElementById('pivot-user-select');
  userSel.innerHTML = users.map(u => `<option value="${escHtml(u)}">${escHtml(u)}</option>`).join('');

  const metricSel = document.getElementById('pivot-metric-select');
  metricSel.innerHTML = metrics.map(m => `<option value="${escHtml(m)}">${escHtml(m)}</option>`).join('');
}

function renderPivotTable(structure, pivotConfig, user, metric) {
  const { groups } = structure;
  const { identifierField, pivotField, periodKeys } = pivotConfig;

  // Build pivot data: only groups where user appears
  const pivotRows = [];
  for (const group of groups) {
    const matchingRow = group.rows.find(r => String(r[identifierField] ?? '') === user);
    if (!matchingRow) continue;
    const histObj = matchingRow[pivotField] || {};
    const vals = periodKeys.map(p => {
      const inner = histObj[p];
      return (inner && typeof inner === 'object' && typeof inner[metric] === 'number')
        ? inner[metric] : null;
    });
    const total = vals.reduce((s, v) => s + (v ?? 0), 0);
    pivotRows.push({ groupName: group.name, vals, total });
  }

  // Thead
  const thead = document.getElementById('pivot-table-head');
  thead.innerHTML = '';
  const hrow = document.createElement('tr');
  hrow.innerHTML = `<th>Project</th>` +
    periodKeys.map(p => `<th class="col-num">${escHtml(p)}</th>`).join('') +
    `<th class="col-num">Total</th>`;
  thead.appendChild(hrow);

  // Tbody + totals
  const tbody = document.getElementById('pivot-table-body');
  tbody.innerHTML = '';

  const colTotals = new Array(periodKeys.length).fill(0);
  let grandTotal = 0;

  for (const { groupName, vals, total } of pivotRows) {
    const tr = document.createElement('tr');
    let cells = `<td>${escHtml(groupName)}</td>`;
    vals.forEach((v, i) => {
      if (v !== null) {
        colTotals[i] += v;
        cells += `<td class="col-num">${fmt(v)}</td>`;
      } else {
        cells += `<td class="col-missing">—</td>`;
      }
    });
    grandTotal += total;
    cells += `<td class="col-total">${fmt(total)}</td>`;
    tr.innerHTML = cells;
    tbody.appendChild(tr);
  }

  // Totals row
  const totalsRow = document.createElement('tr');
  totalsRow.className = 'pivot-totals-row';
  let totalsCells = `<td>Totals</td>`;
  colTotals.forEach(v => { totalsCells += `<td class="col-num">${fmt(v)}</td>`; });
  totalsCells += `<td class="col-total">${fmt(grandTotal)}</td>`;
  totalsRow.innerHTML = totalsCells;
  tbody.appendChild(totalsRow);

  return { pivotRows, colTotals, grandTotal };
}

function renderPivotSidebar(pivotData, pivotConfig) {
  const { pivotRows, colTotals, grandTotal } = pivotData;
  const { periodKeys } = pivotConfig;
  const sidebar = document.getElementById('stats-sidebar');

  let html = `<div>
    <div class="stats-section-title">Pivot Summary</div>
    <div class="stats-card">
      <div class="stats-row">
        <span class="stats-label">Grand total</span>
        <span class="stats-value">${fmt(grandTotal)}</span>
      </div>
      <div class="stats-row">
        <span class="stats-label">Projects with user</span>
        <span class="stats-value">${pivotRows.length}</span>
      </div>
    </div>
  </div>`;

  html += `<div><div class="stats-section-title">Period Totals</div><div class="stats-card">`;
  periodKeys.forEach((p, i) => {
    html += `<div class="stats-row">
      <span class="stats-label">${escHtml(p)}</span>
      <span class="stats-value">${fmt(colTotals[i])}</span>
    </div>`;
  });
  html += `</div></div>`;

  sidebar.innerHTML = html;
}

function activatePivotMode() {
  _pivotActive = true;
  document.getElementById('btn-pivot').classList.add('active');
  document.getElementById('pivot-toolbar').classList.remove('hidden-el');
  document.getElementById('search-bar').style.display = 'none';
  document.getElementById('data-table').classList.add('hidden-el');
  document.getElementById('pivot-table').classList.remove('hidden-el');
  refreshPivot();
}

function deactivatePivotMode() {
  _pivotActive = false;
  document.getElementById('btn-pivot').classList.remove('active');
  document.getElementById('pivot-toolbar').classList.add('hidden-el');
  document.getElementById('search-bar').style.display = '';
  document.getElementById('data-table').classList.remove('hidden-el');
  document.getElementById('pivot-table').classList.add('hidden-el');
  applyFilter(document.getElementById('search-input').value);
}

function refreshPivot() {
  if (!_pivotActive || !_pivotConfig) return;
  const user   = document.getElementById('pivot-user-select').value;
  const metric = document.getElementById('pivot-metric-select').value;
  const pivotData = renderPivotTable(_structure, _pivotConfig, user, metric);
  renderPivotSidebar(pivotData, _pivotConfig);
}

// ─────────────────────────────────────────────────────────────
// Table Rendering
// ─────────────────────────────────────────────────────────────
function renderTable(structure) {
  const { groups, columns, mode } = structure;
  const isGrouped = mode === 'grouped';

  // thead
  const thead = document.getElementById('table-head');
  thead.innerHTML = '';
  const hrow = document.createElement('tr');
  for (const col of columns) {
    const th = document.createElement('th');
    th.textContent = col.name;
    if (col.type === 'number') th.classList.add('col-num');
    hrow.appendChild(th);
  }
  thead.appendChild(hrow);

  // tbody
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  let rowIdx = 0;

  for (const group of groups) {
    // Group header row
    if (isGrouped && group.name !== null) {
      const groupRow = document.createElement('tr');
      groupRow.className = 'row-group';
      groupRow.dataset.group = group.name;
      groupRow.dataset.originalIndex = rowIdx++;

      const td = document.createElement('td');
      td.colSpan = columns.length;
      td.innerHTML =
        `<div class="group-name">` +
        `<svg class="group-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>` +
        `<span>${escHtml(group.name)}</span>` +
        `<span class="group-badge" data-total="${group.rows.length}">${group.rows.length} rows</span>` +
        `</div>`;
      groupRow.appendChild(td);
      tbody.appendChild(groupRow);

      groupRow.addEventListener('click', () => {
        const isCollapsed = groupRow.classList.toggle('collapsed');
        groupRow.querySelector('.group-chevron').classList.toggle('collapsed', isCollapsed);
        const dataRows = tbody.querySelectorAll(`.row-data[data-group="${CSS.escape(group.name)}"]`);
        for (const r of dataRows) {
          if (isCollapsed) {
            r.dataset.collapsedByGroup = '1';
            r.classList.add('hidden');
          } else {
            delete r.dataset.collapsedByGroup;
            r.classList.remove('hidden'); // dimmed state is already set correctly
          }
        }
      });
    }

    // Data rows
    for (const row of group.rows) {
      const tr = document.createElement('tr');
      tr.className = 'row-data';
      tr.dataset.originalIndex = rowIdx++;
      if (isGrouped && group.name !== null) tr.dataset.group = group.name;

      for (const col of columns) {
        const td = document.createElement('td');
        const val = row[col.name];
        if (col.type === 'nested' && val && typeof val === 'object') {
          td.dataset.raw = '';
          td.dataset.nestedCol = col.name;
          td.dataset.nestedJson = JSON.stringify(val);
          const badge = document.createElement('button');
          badge.className = 'nested-badge';
          badge.innerHTML =
            `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>` +
            escHtml(col.name);
          td.appendChild(badge);
        } else {
          if (col.type === 'number') td.classList.add('col-num');
          const raw = (val !== undefined && val !== null) ? String(val) : '';
          td.dataset.raw = raw;
          td.textContent = raw;
        }
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
  }
}

// ─────────────────────────────────────────────────────────────
// Highlight
// ─────────────────────────────────────────────────────────────
function highlightText(text, term) {
  if (!term || !text) return escHtml(text);
  const lowerText = text.toLowerCase();
  const lowerTerm = term.toLowerCase();
  let result = '';
  let idx = 0;
  while (idx < text.length) {
    const found = lowerText.indexOf(lowerTerm, idx);
    if (found === -1) { result += escHtml(text.slice(idx)); break; }
    result += escHtml(text.slice(idx, found));
    result += `<mark>${escHtml(text.slice(found, found + term.length))}</mark>`;
    idx = found + term.length;
  }
  return result;
}

// ─────────────────────────────────────────────────────────────
// Filter
// ─────────────────────────────────────────────────────────────
function applyFilter(term) {
  const tbody = document.getElementById('table-body');
  const lower = term.toLowerCase().trim();

  const groupMatchCount = {}; // groupKey → count
  let totalMatches = 0;

  // Step 1: evaluate each visible data row — dim non-matches, highlight matches
  const dataRows = [...tbody.querySelectorAll('.row-data')];
  for (const tr of dataRows) {
    if (tr.dataset.collapsedByGroup) { tr.dataset.matchResult = '0'; continue; }

    const tds = tr.querySelectorAll('td');
    let matches = !lower;
    if (lower) {
      for (const td of tds) {
        if (td.dataset.raw.toLowerCase().includes(lower)) { matches = true; break; }
      }
    }

    const groupKey = tr.dataset.group || '__flat__';
    if (!groupMatchCount[groupKey]) groupMatchCount[groupKey] = 0;
    if (matches) { groupMatchCount[groupKey]++; totalMatches++; }

    tr.dataset.matchResult = matches ? '1' : '0';
    tr.classList.toggle('hidden', !matches && !!lower);
    tr.classList.remove('dimmed');

    for (const td of tds) {
      if (td.dataset.nestedCol) continue; // preserve nested badges
      td.innerHTML = (lower && matches) ? highlightText(td.dataset.raw, lower) : escHtml(td.dataset.raw);
    }
  }

  // Step 2: reorder DOM — matching groups first, matching rows first within each group
  if (lower) {
    const sections = _structure.groups.map(group => {
      const gname = group.name;
      const groupRow = gname !== null
        ? tbody.querySelector(`.row-group[data-group="${CSS.escape(gname)}"]`)
        : null;
      const rows = [...tbody.querySelectorAll(
        gname !== null ? `.row-data[data-group="${CSS.escape(gname)}"]` : '.row-data:not([data-group])'
      )];
      return { gname, groupRow, rows };
    });

    // Groups with at least one match float to top; ties preserve original order
    sections.sort((a, b) => {
      const aHas = (groupMatchCount[a.gname || '__flat__'] || 0) > 0 ? 0 : 1;
      const bHas = (groupMatchCount[b.gname || '__flat__'] || 0) > 0 ? 0 : 1;
      return aHas - bHas;
    });

    for (const { groupRow, rows } of sections) {
      if (groupRow) tbody.appendChild(groupRow);
      const matching    = rows.filter(r => r.dataset.matchResult === '1');
      const nonMatching = rows.filter(r => r.dataset.matchResult !== '1');
      for (const r of [...matching, ...nonMatching]) tbody.appendChild(r);
    }
  } else {
    // Restore original insertion order
    const allRows = [...tbody.querySelectorAll('tr')];
    allRows.sort((a, b) => +a.dataset.originalIndex - +b.dataset.originalIndex);
    for (const r of allRows) tbody.appendChild(r);
  }

  // Step 3: update group header badges and dim groups with zero matches
  for (const groupRow of tbody.querySelectorAll('.row-group')) {
    const gname = groupRow.dataset.group;
    const count = groupMatchCount[gname] || 0;
    const total = +groupRow.querySelector('.group-badge').dataset.total;
    const badge = groupRow.querySelector('.group-badge');
    badge.textContent = lower ? `${count} match${count !== 1 ? 'es' : ''}` : `${total} rows`;
    groupRow.classList.toggle('hidden', !!lower && count === 0);
    groupRow.classList.remove('group-dimmed');
  }

  // Match count chip
  const matchCountEl = document.getElementById('match-count');
  if (!lower) {
    matchCountEl.textContent = '';
    matchCountEl.className = 'match-count';
  } else {
    matchCountEl.textContent = `${totalMatches} match${totalMatches !== 1 ? 'es' : ''}`;
    matchCountEl.className = 'match-count has-matches';
  }

  renderStats(lower, groupMatchCount);
}

// ─────────────────────────────────────────────────────────────
// Stats Sidebar
// ─────────────────────────────────────────────────────────────
function renderStats(lower, groupMatchCount) {
  const sidebar = document.getElementById('stats-sidebar');
  const { groups, columns, mode } = _structure;

  // Collect matched rows
  const matchedRows = [];
  for (const group of groups) {
    for (const row of group.rows) {
      if (!lower) {
        matchedRows.push(row);
      } else {
        const vals = Object.values(row).map(v =>
          (v !== null && v !== undefined) ? String(v).toLowerCase() : ''
        );
        if (vals.some(v => v.includes(lower))) matchedRows.push(row);
      }
    }
  }

  const numCols = columns.filter(c => c.type === 'number');
  let html = '';

  // Summary card
  const totalRows = groups.reduce((s, g) => s + g.rows.length, 0);
  html += `<div>
    <div class="stats-section-title">Summary</div>
    <div class="stats-card">
      <div class="stats-row">
        <span class="stats-label">Matching rows</span>
        <span class="stats-value">${matchedRows.length}</span>
      </div>
      <div class="stats-row">
        <span class="stats-label">Total rows</span>
        <span class="stats-value">${totalRows}</span>
      </div>
    </div>
  </div>`;

  // Numeric column stats
  if (numCols.length > 0) {
    html += `<div><div class="stats-section-title">Numeric Columns</div>`;
    for (const col of numCols) {
      const vals = matchedRows
        .map(r => r[col.name])
        .filter(v => v !== null && v !== undefined && typeof v === 'number');
      if (vals.length === 0) continue;

      const sum = vals.reduce((a, b) => a + b, 0);
      const avg = sum / vals.length;
      const min = Math.min(...vals);
      const max = Math.max(...vals);

      html += `<div class="stats-card">
        <div class="stats-col-name">${escHtml(col.name)}</div>
        <div class="stats-row"><span class="stats-label">Sum</span><span class="stats-value">${fmt(sum)}</span></div>
        <div class="stats-row"><span class="stats-label">Avg</span><span class="stats-value">${fmt(avg)}</span></div>
        <div class="stats-row"><span class="stats-label">Min</span><span class="stats-value">${fmt(min)}</span></div>
        <div class="stats-row"><span class="stats-label">Max</span><span class="stats-value">${fmt(max)}</span></div>
        <div class="stats-row"><span class="stats-label">Count</span><span class="stats-value">${vals.length}</span></div>`;

      // 100% indicator for percentage columns
      const colLower = col.name.toLowerCase();
      if (colLower.includes('percent') || colLower.includes('%')) {
        const diff = Math.round((100 - sum) * 10) / 10;
        const rounded = Math.round(sum * 10) / 10;
        if (Math.abs(sum - 100) < 0.05) {
          html += `<div class="percent-indicator percent-ok">✓ Sums to 100%</div>`;
        } else if (sum < 100) {
          html += `<div class="percent-indicator percent-low">⚠ Needs ${diff} more (${rounded}%)</div>`;
        } else {
          html += `<div class="percent-indicator percent-hi">⚠ Over by ${Math.abs(diff)} (${rounded}%)</div>`;
        }
      }

      html += `</div>`;
    }
    html += `</div>`;
  }

  // Groups breakdown
  if (mode === 'grouped') {
    html += `<div><div class="stats-section-title">Groups</div><div class="stats-card"><div>`;
    for (const group of groups) {
      const count = lower ? (groupMatchCount[group.name] || 0) : group.rows.length;
      html += `<div class="group-stat-row">
        <span class="group-stat-name">${escHtml(group.name)}</span>
        <span class="group-stat-count">${count}</span>
      </div>`;
    }
    html += `</div></div></div>`;
  }

  sidebar.innerHTML = html;
}

// ─────────────────────────────────────────────────────────────
// Load & View Transition
// ─────────────────────────────────────────────────────────────
function loadJSON(text) {
  const errEl = document.getElementById('error-msg');
  errEl.classList.remove('visible');

  let parsed;
  try {
    parsed = JSON.parse(text);
  } catch (e) {
    errEl.textContent = 'Invalid JSON: ' + e.message;
    errEl.classList.add('visible');
    return;
  }

  try {
    _structure = detectStructure(parsed);
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.add('visible');
    return;
  }

  // Reset pivot state
  _pivotActive = false;
  _pivotConfig = null;
  document.getElementById('pivot-toolbar').classList.add('hidden-el');
  document.getElementById('data-table').classList.remove('hidden-el');
  document.getElementById('pivot-table').classList.add('hidden-el');
  document.getElementById('search-bar').style.display = '';

  // Detect pivot eligibility
  _pivotConfig = detectPivotConfig(parsed);
  const btnPivot = document.getElementById('btn-pivot');
  if (_pivotConfig) {
    btnPivot.classList.remove('hidden-el');
    renderPivotToolbar(_pivotConfig);
  } else {
    btnPivot.classList.add('hidden-el');
  }

  renderTable(_structure);
  document.getElementById('search-input').value = '';
  applyFilter('');

  // Switch views
  document.getElementById('view-input').style.display = 'none';
  document.getElementById('view-viewer').classList.add('active');
  document.getElementById('btn-new-json').classList.remove('hidden-el');
}

// Event Handlers
// ─────────────────────────────────────────────────────────────

// Example dataset button
document.getElementById('btn-example').addEventListener('click', () => {
  loadJSON(JSON.stringify(DEMO_DATA));
});

// Load button
document.getElementById('btn-load').addEventListener('click', () => {
  const text = document.getElementById('json-input').value.trim();
  if (!text) {
    const errEl = document.getElementById('error-msg');
    errEl.textContent = 'Please paste JSON or upload a file first.';
    errEl.classList.add('visible');
    return;
  }
  loadJSON(text);
});

// Load new JSON button
document.getElementById('btn-new-json').addEventListener('click', () => {
  _pivotActive = false;
  document.getElementById('btn-pivot').classList.remove('active');
  document.getElementById('view-viewer').classList.remove('active');
  document.getElementById('view-input').style.display = '';
  document.getElementById('btn-new-json').classList.add('hidden-el');
  document.getElementById('json-input').value = '';
  document.getElementById('error-msg').classList.remove('visible');
});

// File picker
document.getElementById('file-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => loadJSON(ev.target.result);
  reader.readAsText(file);
  e.target.value = '';
});

// Drag-and-drop onto drop zone
const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = (ev) => loadJSON(ev.target.result);
    reader.readAsText(file);
  } else {
    const text = e.dataTransfer.getData('text');
    if (text) loadJSON(text);
  }
});

// Search (debounced 150ms)
let _searchTimer = null;
document.getElementById('search-input').addEventListener('input', (e) => {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => applyFilter(e.target.value), 150);
});

// Pivot toggle
document.getElementById('btn-pivot').addEventListener('click', () => {
  if (_pivotActive) deactivatePivotMode(); else activatePivotMode();
});
document.getElementById('btn-exit-pivot').addEventListener('click', deactivatePivotMode);

// Pivot selectors
document.getElementById('pivot-user-select').addEventListener('change', refreshPivot);
document.getElementById('pivot-metric-select').addEventListener('change', refreshPivot);

// ─────────────────────────────────────────────────────────────
// Nested Object Modal
// ─────────────────────────────────────────────────────────────
function openNestedModal(tr, colName) {
  const { groups, columns } = _structure;
  const stringCols = columns.filter(c => c.type === 'string');

  // Identifier from clicked row
  const tds = tr.querySelectorAll('td');
  const keyValues = {};
  columns.forEach((col, i) => {
    if (col.type === 'string') keyValues[col.name] = tds[i].dataset.raw;
  });

  // Visible groups (respects current search filter)
  const tbody = document.getElementById('table-body');
  const visibleGroups = new Set();
  for (const gr of tbody.querySelectorAll('.row-group')) {
    if (!gr.classList.contains('hidden')) visibleGroups.add(gr.dataset.group);
  }
  const useVisibility = visibleGroups.size > 0;

  // Collect matching rows
  const matchingRows = [];
  for (const group of groups) {
    if (useVisibility && !visibleGroups.has(group.name)) continue;
    for (const row of group.rows) {
      if (!stringCols.every(col => String(row[col.name] ?? '') === keyValues[col.name])) continue;
      const nested = row[colName];
      if (nested && typeof nested === 'object' && !Array.isArray(nested)) {
        matchingRows.push({ groupName: group.name, nested });
      }
    }
  }
  if (matchingRows.length === 0) return;

  const isObjOfObjs = matchingRows.some(({ nested }) =>
    Object.values(nested).length > 0 &&
    Object.values(nested).every(v => v && typeof v === 'object' && !Array.isArray(v))
  );

  // Collect sorted periods + metrics (if obj-of-objs)
  let sortedPeriods = [], metricList = [];
  if (isObjOfObjs) {
    const allPeriods = new Set(), allMetrics = new Set();
    for (const { nested } of matchingRows) {
      for (const [period, metrics] of Object.entries(nested)) {
        allPeriods.add(period);
        if (metrics && typeof metrics === 'object') {
          for (const mk of Object.keys(metrics)) allMetrics.add(mk);
        }
      }
    }
    sortedPeriods = [...allPeriods].sort((a, b) => {
      const na = parseInt(a.match(/^(\d+)/)?.[1] ?? '0', 10);
      const nb = parseInt(b.match(/^(\d+)/)?.[1] ?? '0', 10);
      return na - nb;
    });
    metricList = [...allMetrics];
  }

  _nestedModalState = { matchingRows, isObjOfObjs, sortedPeriods, metricList };

  const titleParts = stringCols.map(c => keyValues[c.name]).filter(Boolean);
  document.getElementById('modal-title').textContent =
    (titleParts.join(' · ') || 'Record') + ' — ' + colName;
  document.getElementById('modal-footer').classList.add('hidden-el');
  document.querySelector('.modal-box').classList.add('modal-wide');

  renderNestedContent('all');
  document.getElementById('record-modal').classList.remove('hidden-el');
}

function renderNestedContent(activePeriod) {
  const { matchingRows, isObjOfObjs, sortedPeriods, metricList } = _nestedModalState;
  let html = '';

  if (isObjOfObjs) {
    // ── Period filter pills ──
    html += `<div class="nested-filter-bar">`;
    html += `<button class="nested-filter-pill${activePeriod === 'all' ? ' active' : ''}" data-period="all">All periods</button>`;
    for (const p of sortedPeriods) {
      html += `<button class="nested-filter-pill${activePeriod === p ? ' active' : ''}" data-period="${escHtml(p)}">${escHtml(p)}</button>`;
    }
    html += `</div>`;

    if (activePeriod === 'all') {
      // Full table: Project | Period | metrics + totals row
      const grandTotals = Object.fromEntries(metricList.map(m => [m, 0]));
      html += `<table class="modal-table"><thead><tr>
        <th>Project</th><th>Period</th>
        ${metricList.map(m => `<th class="col-num">${escHtml(m)}</th>`).join('')}
      </tr></thead><tbody>`;

      for (const { groupName, nested } of matchingRows) {
        sortedPeriods.forEach((period, pi) => {
          const metrics = nested[period] || {};
          html += `<tr>
            <td class="${pi === 0 ? 'modal-project-cell' : 'modal-project-gap'}"
                style="${pi === 0 ? '' : 'border-top:none'}">${pi === 0 ? escHtml(groupName) : ''}</td>
            <td class="modal-period-cell">${escHtml(period)}</td>
            ${metricList.map(m => {
              const v = metrics[m];
              if (typeof v === 'number') grandTotals[m] += v;
              return `<td class="col-num">${typeof v === 'number' ? fmt(v) : (v !== undefined ? escHtml(String(v)) : '—')}</td>`;
            }).join('')}
          </tr>`;
        });
      }
      html += `<tr class="nested-totals-row">
        <td>Total</td><td></td>
        ${metricList.map(m => `<td class="col-num">${fmt(grandTotals[m])}</td>`).join('')}
      </tr>`;
      html += `</tbody></table>`;

    } else {
      // Filtered table: Project | metrics for selected period
      const rowData = matchingRows.map(({ groupName, nested }) => {
        const metrics = nested[activePeriod] || {};
        const vals = Object.fromEntries(
          metricList.map(m => [m, typeof metrics[m] === 'number' ? metrics[m] : null])
        );
        return { groupName, vals };
      });

      const totals = Object.fromEntries(
        metricList.map(m => [m, rowData.reduce((s, r) => s + (r.vals[m] ?? 0), 0)])
      );

      html += `<table class="modal-table"><thead><tr>
        <th>Project</th>
        ${metricList.map(m => `<th class="col-num">${escHtml(m)}</th>`).join('')}
      </tr></thead><tbody>`;

      for (const { groupName, vals } of rowData) {
        html += `<tr>
          <td class="modal-project-cell">${escHtml(groupName)}</td>
          ${metricList.map(m => `<td class="col-num">${vals[m] !== null ? fmt(vals[m]) : '—'}</td>`).join('')}
        </tr>`;
      }
      html += `<tr class="nested-totals-row">
        <td>Total</td>
        ${metricList.map(m => `<td class="col-num">${fmt(totals[m])}</td>`).join('')}
      </tr>`;
      html += `</tbody></table>`;

      // ── Distribution section ──
      const numericMetrics = metricList.filter(m => totals[m] !== 0);
      if (numericMetrics.length > 0) {
        html += `<div class="nested-summary"><div class="nested-summary-title">Distribution</div>`;
        for (const m of numericMetrics) {
          html += `<div class="nested-dist-row">
            <span class="nested-dist-metric">${escHtml(m)}</span>
            <span class="nested-dist-values">`;
          for (const { groupName, vals } of rowData) {
            if (vals[m] === null) continue;
            const pct = totals[m] > 0 ? (vals[m] / totals[m] * 100).toFixed(1) : '0.0';
            html += `<span class="nested-dist-chip">${escHtml(groupName)}<strong>${pct}%</strong></span>`;
          }
          html += `</span></div>`;
        }
        html += `</div>`;
      }
    }

  } else {
    // Plain object: Project | key1 | key2…
    const allKeys = new Set();
    for (const { nested } of matchingRows) for (const k of Object.keys(nested)) allKeys.add(k);
    const keyList = [...allKeys];
    html += `<table class="modal-table"><thead><tr>
      <th>Project</th>
      ${keyList.map(k => `<th>${escHtml(k)}</th>`).join('')}
    </tr></thead><tbody>`;
    for (const { groupName, nested } of matchingRows) {
      html += `<tr><td class="modal-project-cell">${escHtml(groupName)}</td>
        ${keyList.map(k => `<td>${nested[k] !== undefined ? escHtml(String(nested[k])) : '—'}</td>`).join('')}
      </tr>`;
    }
    html += `</tbody></table>`;
  }

  document.getElementById('modal-body').innerHTML = html;
}

// ─────────────────────────────────────────────────────────────
// Record Modal
// ─────────────────────────────────────────────────────────────
function openRecordModal(tr) {
  const { groups, columns, mode } = _structure;
  const stringCols = columns.filter(c => c.type === 'string');
  const numCols    = columns.filter(c => c.type === 'number');

  // Composite key: all string column values from the clicked row
  const tds = tr.querySelectorAll('td');
  const keyValues = {};
  columns.forEach((col, i) => {
    if (col.type === 'string') keyValues[col.name] = tds[i].dataset.raw;
  });

  // Find every row across all groups that shares the same string values
  const matches = [];
  for (const group of groups) {
    for (const row of group.rows) {
      if (stringCols.every(col => String(row[col.name] ?? '') === keyValues[col.name])) {
        matches.push({ groupName: group.name, row });
      }
    }
  }

  // Title
  const titleParts = stringCols.map(c => keyValues[c.name]).filter(Boolean);
  document.getElementById('modal-title').textContent = titleParts.join(' · ') || 'Record Detail';

  // Body
  let bodyHtml = '';
  if (mode === 'grouped') {
    bodyHtml += `<table class="modal-table"><thead><tr><th>Project</th>`;
    for (const col of numCols) bodyHtml += `<th class="col-num">${escHtml(col.name)}</th>`;
    bodyHtml += `</tr></thead><tbody>`;
    for (const { groupName, row } of matches) {
      bodyHtml += `<tr><td class="group-cell">${escHtml(groupName)}</td>`;
      for (const col of numCols) {
        const val = row[col.name];
        bodyHtml += `<td class="col-num">${val !== undefined && val !== null ? fmt(val) : '—'}</td>`;
      }
      bodyHtml += `</tr>`;
    }
    bodyHtml += `</tbody></table>`;
  } else {
    // Flat mode: key-value detail view
    bodyHtml += `<table class="modal-table"><tbody>`;
    columns.forEach((col, i) => {
      bodyHtml += `<tr><td class="kv-key">${escHtml(col.name)}</td>` +
        `<td class="${col.type === 'number' ? 'col-num' : ''}">${escHtml(tds[i].dataset.raw) || '—'}</td></tr>`;
    });
    bodyHtml += `</tbody></table>`;
  }
  document.getElementById('modal-body').innerHTML = bodyHtml;

  // Footer: totals for numeric columns (grouped mode)
  const footer = document.getElementById('modal-footer');
  if (mode === 'grouped' && numCols.length > 0) {
    let footerHtml = '';
    for (const col of numCols) {
      const vals = matches.map(m => m.row[col.name]).filter(v => typeof v === 'number');
      if (vals.length === 0) continue;
      const sum = vals.reduce((a, b) => a + b, 0);

      let indicator = '';
      const colLower = col.name.toLowerCase();
      if (colLower.includes('percent') || colLower.includes('%')) {
        const diff = Math.round((100 - sum) * 10) / 10;
        if (Math.abs(sum - 100) < 0.05) {
          indicator = ` <span class="pct-ok">✓ 100%</span>`;
        } else if (sum < 100) {
          indicator = ` <span class="pct-low">needs ${diff} more</span>`;
        } else {
          indicator = ` <span class="pct-hi">over by ${Math.abs(diff)}</span>`;
        }
      }

      footerHtml += `<div class="modal-stat">
        <span class="modal-stat-label">${escHtml(col.name)}</span>
        <span class="modal-stat-value">${fmt(sum)}${indicator}</span>
      </div>`;
    }
    footer.innerHTML = footerHtml;
    footer.classList.toggle('hidden-el', !footerHtml);
  } else {
    footer.classList.add('hidden-el');
  }

  document.getElementById('record-modal').classList.remove('hidden-el');
}

function closeModal() {
  document.getElementById('record-modal').classList.add('hidden-el');
  document.querySelector('.modal-box').classList.remove('modal-wide');
  _nestedModalState = null;
}

// Row click → open nested or record modal
document.getElementById('table-body').addEventListener('click', (e) => {
  const badge = e.target.closest('.nested-badge');
  if (badge) {
    const td = badge.closest('td');
    const tr = badge.closest('tr');
    if (tr && !tr.classList.contains('hidden')) openNestedModal(tr, td.dataset.nestedCol);
    return;
  }
  const tr = e.target.closest('.row-data');
  if (tr && !tr.classList.contains('hidden')) openRecordModal(tr);
});

// Period filter pills (event delegation on modal body)
document.getElementById('modal-body').addEventListener('click', (e) => {
  const pill = e.target.closest('.nested-filter-pill');
  if (pill && _nestedModalState) renderNestedContent(pill.dataset.period);
});

// Close on X button, backdrop click, or Escape
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('record-modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});
</script>
</body>
</html>
