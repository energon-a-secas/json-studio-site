<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Viewer</title>
  <meta name="description" content="Paste or upload JSON and explore records as a searchable nested table with live aggregate stats.">
  <meta name="theme-color" content="#040714">
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #040714;
      --surface-1: rgba(255,255,255,0.025);
      --surface-2: rgba(255,255,255,0.05);
      --border-subtle: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.1);
      --text-primary: #f9f9f9;
      --text-secondary: #cacaca;
      --text-muted: rgba(255,255,255,0.55);
      --accent: #0063e5;
      --accent-bright: #0080ff;
      --danger: #ef4444;
      --success: #10b981;
      --warning: #f59e0b;
      --font: 'Avenir Next', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', monospace;
      --active-bg: rgba(0,99,229,0.15);
      --active-color: #60a5fa;
      --active-border: rgba(0,99,229,0.3);
      --shadow-sm: 0 4px 16px rgba(0,0,0,0.5);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.55);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.55);
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header-bar {
      background: linear-gradient(in oklch 135deg, #B015B0 0%, #3D0080 50%, #040714 100%);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 0 24px;
      height: 68px;
      z-index: 100;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .header-logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .header-logo-img {
      height: 36px; width: auto; flex-shrink: 0;
      filter: brightness(0) invert(1);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: block;
    }
    .header-logo-img:hover { transform: scale(1.14) rotate(-9deg); }
    .header-logo h1 { font-size: 1.2em; font-weight: 600; letter-spacing: 0.5px; }
    .header-subtitle { font-size: 0.82em; color: rgba(255,255,255,0.72); font-weight: 500; margin-top: 3px; }
    .header-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }

    /* ── Home icon ── */
    .header-home {
      display: flex; align-items: center; padding: 5px;
      color: rgba(255,255,255,0.9); text-decoration: none; border-radius: 6px;
      transition: color .2s, background .2s; flex-shrink: 0;
    }
    .header-home:hover { color: #fff; background: rgba(255,255,255,0.12); }
    .header-home svg { width: 34px; height: 34px; display: block; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 16px; border-radius: 7px;
      font-size: 0.875rem; font-family: var(--font); font-weight: 500;
      cursor: pointer; border: none;
      transition: background 0.15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-bright); }
    .btn-ghost {
      background: rgba(255,255,255,0.08); color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.14); }
    .btn-sm { padding: 5px 12px; font-size: 0.82rem; }

    /* ── Input View ── */
    #view-input {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      overflow-y: auto;
    }

    .input-card {
      width: 100%;
      max-width: 720px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .input-title { font-size: 1.1rem; font-weight: 600; }

    .drop-zone {
      border: 2px dashed rgba(255,255,255,0.15);
      border-radius: 10px;
      background: rgba(255,255,255,0.02);
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(0,99,229,0.08);
    }

    #json-input {
      width: 100%;
      min-height: 240px;
      background: transparent;
      border: none;
      outline: none;
      resize: vertical;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      color: var(--text-primary);
      padding: 16px;
      line-height: 1.6;
    }
    #json-input::placeholder { color: var(--text-muted); }

    .input-row { display: flex; align-items: center; gap: 12px; }

    .file-label {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 16px; border-radius: 7px;
      font-size: 0.875rem; font-weight: 500;
      cursor: pointer;
      background: rgba(255,255,255,0.08); color: var(--text-primary);
      border: 1px solid var(--border);
      transition: background 0.15s; user-select: none;
    }
    .file-label:hover { background: rgba(255,255,255,0.14); }
    #file-input { display: none; }

    .input-example {
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .example-buttons {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px;
    }
    .btn-example {
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 7px; cursor: pointer;
      color: var(--text-secondary); font-size: 0.82rem;
      font-family: var(--font); padding: 6px 14px;
      transition: background 0.15s, color 0.15s;
      display: flex; flex-direction: column; gap: 1px; text-align: left;
    }
    .btn-example:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
    .btn-example-sub { font-size: 0.72rem; color: var(--text-muted); }

    .error-msg {
      color: var(--danger); font-size: 0.85rem;
      padding: 10px 14px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 7px;
      display: none;
    }
    .error-msg.visible { display: block; }

    /* ── Viewer View ── */
    #view-viewer {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    #view-viewer.active { display: flex; }

    .search-bar {
      padding: 12px 24px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .search-wrap { position: relative; flex: 1; }
    .search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted); pointer-events: none;
    }
    #search-input {
      width: 100%;
      padding: 9px 12px 9px 36px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: var(--font); font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    #search-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.07); }
    #search-input::placeholder { color: var(--text-muted); }

    .match-count { font-size: 0.82rem; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
    .match-count.has-matches { color: var(--text-secondary); }

    /* ── Regex toggle ── */
    .btn-regex {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: 1px solid transparent; border-radius: 5px;
      padding: 2px 7px; font-size: 0.75rem; font-family: var(--font-mono);
      color: var(--text-muted); cursor: pointer; transition: all 0.12s;
      line-height: 1.6; user-select: none;
    }
    .btn-regex:hover { color: var(--text-secondary); border-color: var(--border); }
    .btn-regex.active { color: #a78bfa; background: rgba(124,58,237,0.15); border-color: rgba(124,58,237,0.35); }
    #search-input.regex-mode { padding-right: 46px; }
    #search-input.regex-invalid { border-color: var(--danger) !important; }

    /* ── Active filter badge ── */
    .filter-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 500;
      background: var(--active-bg); color: var(--active-color);
      border: 1px solid var(--active-border); cursor: pointer; white-space: nowrap;
      transition: background 0.12s;
    }
    .filter-badge:hover { background: rgba(239,68,68,0.15); color: #f87171; border-color: rgba(239,68,68,0.3); }

    /* ── Main layout ── */
    .viewer-body { display: flex; flex: 1; overflow: hidden; min-height: 0; }

    .table-area { flex: 1; overflow: auto; }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }

    thead {
      position: sticky; top: 0; z-index: 10;
      background: #0b0918;
    }
    thead th {
      padding: 10px 14px;
      text-align: left; font-weight: 600;
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    thead th.col-num { text-align: right; }

    /* Group rows */
    .row-group {
      cursor: pointer;
      background: rgba(255,255,255,0.04);
      user-select: none;
    }
    .row-group:hover { background: rgba(255,255,255,0.07); }
    .row-group td {
      padding: 10px 14px;
      font-weight: 600; font-size: 0.82rem;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border-subtle);
    }
    .group-name { display: flex; align-items: center; gap: 8px; }
    .group-chevron {
      width: 16px; height: 16px; flex-shrink: 0;
      transition: transform 0.18s;
      color: var(--text-muted);
    }
    .group-chevron.collapsed { transform: rotate(-90deg); }
    .group-badge {
      font-size: 0.72rem; font-weight: 500;
      background: rgba(255,255,255,0.1);
      padding: 2px 7px; border-radius: 10px;
      color: var(--text-muted);
    }

    /* Data rows */
    .row-data td {
      padding: 8px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--text-secondary);
    }
    .row-data { cursor: pointer; }
    .row-data:hover td { background: rgba(255,255,255,0.05); }
    .row-data.hidden { display: none; }
    .row-data td.col-num {
      text-align: right;
      font-family: var(--font-mono); font-size: 0.82rem;
    }

    mark {
      background: rgba(245,158,11,0.35);
      color: inherit; border-radius: 2px; padding: 0 1px;
    }

    /* ── Stats Sidebar ── */
    .stats-sidebar {
      width: 280px; flex-shrink: 0;
      border-left: 1px solid var(--border-subtle);
      overflow-y: auto;
      padding: 16px;
      display: flex; flex-direction: column; gap: 14px;
    }

    .stats-section-title {
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); margin-bottom: 6px;
    }

    .stats-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px; padding: 12px 14px;
    }

    .stats-col-name {
      font-size: 0.8rem; font-weight: 600;
      color: var(--text-primary); margin-bottom: 8px;
      word-break: break-all;
    }

    .stats-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 3px 0; font-size: 0.8rem;
    }
    .stats-label { color: var(--text-muted); }
    .stats-value { font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-secondary); }

    .percent-indicator {
      margin-top: 8px; padding: 6px 10px;
      border-radius: 6px; font-size: 0.78rem; font-weight: 500;
    }
    .percent-ok  { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.25); }
    .percent-low { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.25); }
    .percent-hi  { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.25); }

    .group-stat-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.8rem; padding: 4px 0;
    }
    .group-stat-name { color: var(--text-secondary); font-size: 0.78rem; word-break: break-all; }
    .group-stat-count {
      font-family: var(--font-mono); font-size: 0.75rem;
      color: var(--text-muted);
      background: rgba(255,255,255,0.07);
      padding: 1px 7px; border-radius: 10px; flex-shrink: 0; margin-left: 6px;
    }

    .hidden-el { display: none !important; }

    /* ── Column filter bar ── */
    .filter-bar {
      display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
      padding: 8px 16px; border-bottom: 1px solid var(--border-subtle);
      background: rgba(255,255,255,0.015);
      flex-shrink: 0;
    }
    .filter-bar-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
    .filter-group {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border-subtle);
      border-radius: 8px; padding: 3px 6px 3px 8px;
    }
    .filter-group-name { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; margin-right: 2px; }
    .filter-chip {
      padding: 2px 9px; border-radius: 5px; font-size: 0.73rem;
      cursor: pointer; background: rgba(255,255,255,0.06); color: var(--text-muted);
      border: 1px solid transparent; user-select: none; transition: all 0.1s; white-space: nowrap;
    }
    .filter-chip:hover { background: rgba(255,255,255,0.12); color: var(--text-secondary); }
    .filter-chip.active { background: var(--active-bg); color: var(--active-color); border: 1px solid var(--active-border); }
    .filter-clear { font-size: 0.7rem; color: var(--text-muted); cursor: pointer; padding: 2px 6px; border-radius: 4px; }
    .filter-clear:hover { color: var(--danger); background: rgba(239,68,68,0.1); }

    /* ── Column visibility dropdown ── */
    .cols-dropdown-wrap { position: relative; }
    .cols-dropdown {
      position: absolute; top: calc(100% + 6px); right: 0; z-index: 50;
      background: #0d0a1a; border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 6px;
      min-width: 180px; max-height: 320px; overflow-y: auto;
      box-shadow: var(--shadow-lg);
      display: flex; flex-direction: column; gap: 2px;
    }
    .cols-dropdown-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; border-radius: 6px; cursor: pointer;
      font-size: 0.82rem; color: var(--text-secondary); user-select: none;
    }
    .cols-dropdown-item:hover { background: rgba(255,255,255,0.06); }
    .cols-dropdown-item input[type=checkbox] { accent-color: var(--accent); cursor: pointer; }
    .cols-dropdown-item.hidden-col { color: var(--text-muted); }

    /* ── Heat map ── */
    td.heat-cell { transition: background-color 0.2s; }
    #btn-heat.active { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
    #btn-sparklines.active { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }

    /* ── Sparklines ── */
    .spark-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .spark-track { width: 100%; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.08); }
    .spark-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.2s; }

    /* ── Keyboard-focused row ── */
    .row-data.keyboard-focused td {
      background: rgba(0,99,229,0.1) !important;
      outline: 1px solid rgba(0,99,229,0.25);
      outline-offset: -1px;
    }

    /* ── Copy-row button ── */
    .copy-row-btn {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      opacity: 0; transition: opacity 0.12s;
      background: rgba(255,255,255,0.09); border: 1px solid var(--border);
      border-radius: 5px; padding: 2px 8px;
      font-size: 0.7rem; color: var(--text-muted); cursor: pointer;
      display: inline-flex; align-items: center; gap: 4px; white-space: nowrap;
      font-family: var(--font);
    }
    tr.row-data:hover .copy-row-btn { opacity: 1; }
    .copy-row-btn:hover { background: rgba(255,255,255,0.18); color: var(--text-primary); }
    .row-data td:last-child { position: relative; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 999;
      background: #1a1730; border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px; padding: 10px 16px;
      font-size: 0.84rem; color: var(--text-primary);
      box-shadow: var(--shadow-md);
      pointer-events: none;
      transform: translateY(8px); opacity: 0;
      transition: opacity 0.18s, transform 0.18s;
    }
    .toast.visible { opacity: 1; transform: translateY(0); }

    /* ── Nested object badge ── */
    .nested-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 4px;
      font-size: 0.75rem; font-family: var(--font); font-weight: 500;
      background: rgba(124,58,237,0.15); color: #a78bfa;
      border: 1px solid rgba(124,58,237,0.3);
      cursor: pointer; user-select: none;
      transition: background 0.15s;
    }
    .nested-badge:hover { background: rgba(124,58,237,0.28); }

    /* ── Wide modal variant for nested data ── */
    .modal-box.modal-wide { max-width: 860px; }
    .modal-period-cell {
      font-family: var(--font-mono); font-size: 0.8rem;
      color: var(--text-muted); white-space: nowrap;
    }
    .modal-project-cell {
      color: var(--text-primary); font-weight: 600; white-space: nowrap;
    }
    .modal-project-gap {
      color: transparent; border-bottom: none !important;
    }

    /* ── Column sorting ── */
    thead th.sortable { cursor: pointer; user-select: none; }
    thead th.sortable:hover { color: var(--text-secondary); background: rgba(255,255,255,0.04); }
    thead th .sort-icon { margin-left: 5px; opacity: 0.25; font-style: normal; }
    thead th.sort-asc  .sort-icon,
    thead th.sort-desc .sort-icon { opacity: 1; color: var(--accent); }

    /* ── Period filter pills (inside nested modal) ── */
    .nested-filter-bar {
      padding: 12px 16px 8px;
      display: flex; gap: 6px; flex-wrap: wrap;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .nested-filter-pill {
      padding: 4px 13px; border-radius: 20px;
      font-size: 0.78rem; font-weight: 500; font-family: var(--font);
      cursor: pointer; border: 1px solid var(--border);
      background: rgba(255,255,255,0.05); color: var(--text-muted);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .nested-filter-pill:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
    .nested-filter-pill.active { background: var(--active-bg); color: var(--active-color); border: 1px solid var(--active-border); }

    /* ── Totals row inside nested table ── */
    .nested-totals-row td {
      border-top: 1px solid var(--border) !important;
      background: rgba(255,255,255,0.04);
      font-weight: 700; color: var(--text-primary);
    }

    /* ── Distribution section below filtered table ── */
    .nested-summary {
      padding: 12px 16px 14px;
      border-top: 1px solid var(--border-subtle);
    }
    .nested-summary-title {
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); margin-bottom: 8px;
    }
    .nested-dist-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 5px 0; font-size: 0.8rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .nested-dist-row:last-child { border-bottom: none; }
    .nested-dist-metric {
      color: var(--text-muted); min-width: 140px; flex-shrink: 0;
      font-size: 0.78rem; padding-top: 3px;
    }
    .nested-dist-values { display: flex; flex-wrap: wrap; gap: 6px; }
    .nested-dist-chip {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 5px; padding: 2px 9px;
      font-size: 0.78rem; color: var(--text-secondary);
    }
    .nested-dist-chip strong { color: var(--text-primary); margin-left: 4px; }

    /* ── Pivot Toggle Button ── */
    .btn-pivot-toggle {
      background: rgba(255,255,255,0.08); color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .btn-pivot-toggle:hover { background: rgba(255,255,255,0.14); }
    .btn-pivot-toggle.active {
      background: var(--active-bg); color: var(--active-color); border: 1px solid var(--active-border);
    }

    /* ── Pivot Toolbar ── */
    .pivot-toolbar {
      padding: 10px 24px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0; flex-wrap: wrap;
    }
    .pivot-toolbar-label {
      font-size: 0.78rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-muted);
    }
    .pivot-select {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-primary);
      font-family: var(--font); font-size: 0.875rem;
      padding: 7px 12px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .pivot-select:focus { border-color: var(--accent); background: rgba(255,255,255,0.07); }
    .pivot-select option { background: #0d0a1a; }

    /* ── Pivot Table ── */
    .pivot-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }

      background: #0b0918;
    }
    .pivot-table thead th {
      padding: 10px 14px;
      text-align: left; font-weight: 600;
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .pivot-table thead th.col-num { text-align: right; }
    .pivot-table td {
      padding: 9px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--text-secondary);
    }
    .pivot-table td.col-num {
      text-align: right;
      font-family: var(--font-mono); font-size: 0.82rem;
    }
    .pivot-table td.col-missing {
      text-align: right;
      font-family: var(--font-mono); font-size: 0.82rem;
      color: var(--text-muted);
    }
    .pivot-table tr.pivot-totals-row {
      background: rgba(255,255,255,0.04);
    }
    .pivot-table tr.pivot-totals-row td {
      font-weight: 700;
      color: var(--text-primary);
      border-top: 1px solid var(--border);
    }
    .pivot-table td.col-total {
      text-align: right;
      font-family: var(--font-mono); font-size: 0.82rem;
      font-weight: 600; color: var(--text-primary);
    }

    /* ── Timeline Chart ── */
    .timeline-area {
      padding: 20px 24px 24px;
      display: flex; flex-direction: column; gap: 18px;
      overflow-y: auto;
    }
    .timeline-chart-wrap {
      background: var(--surface-1);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      padding: 20px 20px 12px;
      position: relative;
    }
    .timeline-chart-title {
      font-size: 0.8rem; font-weight: 600; letter-spacing: 0.5px;
      color: var(--text-muted); text-transform: uppercase; margin-bottom: 16px;
    }
    .timeline-svg { display: block; width: 100%; overflow: visible; }
    .timeline-axis-label { font-size: 11px; fill: var(--text-muted); font-family: var(--font); }
    .timeline-grid { stroke: rgba(255,255,255,0.06); stroke-dasharray: 3 4; }
    .timeline-line { fill: none; stroke-width: 2.5; stroke-linejoin: round; stroke-linecap: round; }
    .timeline-dot {
      r: 4.5; stroke-width: 2; stroke: var(--bg);
      cursor: pointer; transition: r 0.12s;
    }
    .timeline-dot:hover { r: 7; }
    .timeline-legend {
      display: flex; flex-wrap: wrap; gap: 10px 18px;
      margin-top: 14px;
    }
    .timeline-legend-item {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.82rem; color: var(--text-secondary);
    }
    .timeline-legend-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .timeline-tooltip {
      position: fixed; z-index: 300;
      background: #0d0a1a; border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px;
      font-size: 0.8rem; color: var(--text-primary);
      pointer-events: none; opacity: 0;
      transition: opacity 0.1s;
      box-shadow: var(--shadow-sm);
      white-space: nowrap;
    }
    .timeline-tooltip.visible { opacity: 1; }
    .timeline-tooltip strong { display: block; margin-bottom: 2px; color: var(--text-muted); font-weight: 500; }

    .btn-chart-toggle {
      background: rgba(255,255,255,0.07);
      color: var(--text-secondary); border: 1px solid var(--border);
      border-radius: 7px; padding: 5px 12px; font-size: 0.82rem;
      font-family: var(--font); font-weight: 500; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .btn-chart-toggle:hover { background: rgba(255,255,255,0.12); color: var(--text-primary); }
    .btn-chart-toggle.active {
      background: rgba(16,185,129,0.15); color: #10b981;
      border-color: rgba(16,185,129,0.35);
    }

    /* ── Record Modal ── */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .modal-box {
      background: #0d0a1a;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      width: 100%; max-width: 600px;
      max-height: 82vh;
      display: flex; flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .modal-title { font-size: 1.05rem; font-weight: 600; }
    .modal-close {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); padding: 4px; border-radius: 5px;
      display: flex; align-items: center;
      transition: color 0.15s, background 0.15s;
    }
    .modal-close:hover { color: var(--text-primary); background: rgba(255,255,255,0.08); }
    .modal-body { overflow-y: auto; }
    .modal-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    .modal-table thead th {
      padding: 10px 16px; text-align: left;
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-muted);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: #0b0918; position: sticky; top: 0;
    }
    .modal-table thead th.col-num { text-align: right; }
    .modal-table td {
      padding: 9px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: var(--text-secondary);
    }
    .modal-table tbody tr:last-child td { border-bottom: none; }

    .modal-table td.kv-key {
      color: var(--text-muted); font-size: 0.75rem;
      text-transform: uppercase; letter-spacing: 0.05em; width: 40%;
    }
    .modal-footer {

      display: flex; flex-wrap: wrap; gap: 10px;
      flex-shrink: 0; background: rgba(255,255,255,0.02);

    .modal-stat {

// ─────────────────────────────────────────────────────────────
// URL / Session state
// ─────────────────────────────────────────────────────────────
let _pendingState = null; // view state to apply after next loadJSON

function pushViewState() {
  const state = {
    q: $('search-input').value || undefined,
    s: _sortCol || undefined,
    d: _sortDir !== 'asc' ? _sortDir : undefined,
    h: _hiddenCols.size ? [..._hiddenCols] : undefined,
  };
  const hasState = state.q || state.s || state.h;
  try {
    const hash = hasState ? '#v=' + btoa(encodeURIComponent(JSON.stringify(state))) : location.pathname + location.search;
    history.replaceState(null, '', hasState ? hash : location.pathname + location.search);
  } catch (e) { /* ignore */ }
}

function parseViewStateHash() {
  const hash = location.hash;
  if (!hash.startsWith('#v=')) return null;
  try { return JSON.parse(decodeURIComponent(atob(hash.slice(3)))); } catch (e) { return null; }
}

function applyViewState(state) {
  if (!state || !_structure) return;
  if (state.s) {
    _sortCol = state.s; _sortDir = state.d || 'asc'; _sortClicks = 0;
    renderTable(_structure);
    applyColFilters();
    if (_heatMapEnabled) applyHeatMap();
  }
  if (state.h && state.h.length) {
    state.h.forEach(c => _hiddenCols.add(c));
    renderTable(_structure);
    buildFilterBar();
    updateFilterBadge();
  }
  if (state.q) {
    $('search-input').value = state.q;
    applyFilter(state.q);
  }
}

let _toastTimer = null;
function showToast(msg) {
  let el = document.getElementById('app-toast');
  if (!el) { el = document.createElement('div'); el.id = 'app-toast'; el.className = 'toast'; document.body.appendChild(el); }
  el.textContent = msg;
  el.classList.add('visible');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('visible'), 2000);
}

function escHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function fmt(n) {
  if (Number.isInteger(n)) return n.toLocaleString();
  return n.toLocaleString(undefined, { maximumFractionDigits: 2 });
}

function resetViewerState() {
  _sortCol = null; _sortDir = 'asc'; _sortClicks = 0;
  _hiddenCols.clear(); _heatMapEnabled = false;
  _colFilters = {}; _sparklinesEnabled = false;
  _pivotActive = false; _timelineMode = false;
  _periodReversed = false; _pivotConfig = null;
  $('btn-heat').classList.remove('active');
  $('btn-sparklines').classList.remove('active');
  $('btn-chart-toggle').classList.remove('active');
  $('btn-period-order').classList.add('hidden-el');
  $('pivot-toolbar').classList.add('hidden-el');
  $('pivot-table').classList.add('hidden-el');
  $('timeline-area').classList.add('hidden-el');
  $('data-table').classList.remove('hidden-el');

}

function rerender() {

}

// ─────────────────────────────────────────────────────────────
// Structure Detection
// ─────────────────────────────────────────────────────────────
function detectStructure(parsed) {
  let groups = [];
  let mode;

  if (Array.isArray(parsed)) {
    mode = 'flat';
    groups = [{ name: null, rows: parsed.filter(r => r && typeof r === 'object' && !Array.isArray(r)) }];
  } else if (parsed && typeof parsed === 'object') {
    mode = 'grouped';
    const topKeys = Object.keys(parsed);

    // Find the shared array key from the first group
    let arrayKey = null;
    for (const k of topKeys) {
      const val = parsed[k];
      if (val && typeof val === 'object' && !Array.isArray(val)) {
        arrayKey = Object.keys(val).find(ik => Array.isArray(val[ik])) || null;
        if (arrayKey) break;
      }
    }

    for (const k of topKeys) {
      const val = parsed[k];
      let rows = [];
      if (Array.isArray(val)) {
        rows = val.filter(r => r && typeof r === 'object' && !Array.isArray(r));
      } else if (val && typeof val === 'object') {
        if (arrayKey && Array.isArray(val[arrayKey])) {
          rows = val[arrayKey].filter(r => r && typeof r === 'object' && !Array.isArray(r));
        } else {
          // Fallback: first array property
          const firstArr = Object.values(val).find(v => Array.isArray(v));
          rows = firstArr ? firstArr.filter(r => r && typeof r === 'object' && !Array.isArray(r)) : [];
        }
      }
      groups.push({ name: k, rows });
    }
  } else {
    throw new Error('JSON must be an array or an object at the root level.');
  }

  // Collect columns: union of all field names across all rows
  const fieldSet = new Set();
  for (const g of groups) {
    for (const row of g.rows) {
      for (const k of Object.keys(row)) fieldSet.add(k);
    }
  }

  // Infer type: 'number', 'nested' (object), or 'string'
  const columns = [];
  for (const name of fieldSet) {
    let isNum = true;
    let isNested = false;
    for (const g of groups) {
      for (const row of g.rows) {
        const v = row[name];
        if (v !== null && v !== undefined) {
          if (typeof v === 'object' && !Array.isArray(v)) isNested = true;
          if (typeof v !== 'number') isNum = false;
        }
      }
    }
    columns.push({ name, type: isNested ? 'nested' : (isNum ? 'number' : 'string') });
  }

  return { mode, groups, columns };
}

// ─────────────────────────────────────────────────────────────
// Pivot Detection
// ─────────────────────────────────────────────────────────────
function detectPivotConfig(parsed) {
  // Requires grouped mode
  if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) return null;

  const topKeys = Object.keys(parsed);
  if (topKeys.length === 0) return null;

  // Collect a sample of rows from all groups
  let sampleRows = [];
  for (const topKey of topKeys) {
    const val = parsed[topKey];
    if (!val || typeof val !== 'object' || Array.isArray(val)) return null;
    // Find the array within each group
    const arrayKey = Object.keys(val).find(k => Array.isArray(val[k]));
    if (!arrayKey) return null;
    for (const row of val[arrayKey]) {
      if (row && typeof row === 'object' && !Array.isArray(row)) sampleRows.push(row);
    }
  }
  if (sampleRows.length === 0) return null;

  // Find a pivot field: a field whose values are objects of objects (period → metrics)
  let pivotField = null;
  let periodKeys = null;
  let metrics = null;

  for (const fieldName of Object.keys(sampleRows[0])) {
    const vals = sampleRows.map(r => r[fieldName]).filter(v => v !== null && v !== undefined);
    if (vals.length === 0) continue;
    // Check if every non-null value is an object of objects
    const isObjOfObjs = vals.every(v =>
      v && typeof v === 'object' && !Array.isArray(v) &&
      Object.values(v).every(inner => inner && typeof inner === 'object' && !Array.isArray(inner))
    );
    if (!isObjOfObjs) continue;

    // Gather all period keys across all rows
    const allPeriods = new Set();
    for (const v of vals) for (const p of Object.keys(v)) allPeriods.add(p);
    if (allPeriods.size === 0) continue;

    // Gather numeric metric keys from sub-objects
    const numericMetrics = new Set();
    for (const v of vals) {
      for (const periodObj of Object.values(v)) {
        for (const [mk, mv] of Object.entries(periodObj)) {
          if (typeof mv === 'number') numericMetrics.add(mk);
        }
      }
    }
    if (numericMetrics.size === 0) continue;

    pivotField = fieldName;
    // Sort period keys by numeric prefix
    periodKeys = [...allPeriods].sort((a, b) => {
      const na = parseInt(a.match(/^(\d+)/)?.[1] ?? '0', 10);
      const nb = parseInt(b.match(/^(\d+)/)?.[1] ?? '0', 10);
      return na - nb;
    });
    metrics = [...numericMetrics];
    break;
  }

  if (!pivotField) return null;

  // Find an identifier field by name heuristic
  const nameHeuristics = ['name', 'user', 'username'];
  let identifierField = null;
  for (const h of nameHeuristics) {
    if (sampleRows[0] && h in sampleRows[0] && typeof sampleRows[0][h] === 'string') {
      identifierField = h;
      break;
    }
  }
  if (!identifierField) {
    // Fall back to first string column
    for (const key of Object.keys(sampleRows[0] || {})) {
      if (typeof sampleRows[0][key] === 'string') { identifierField = key; break; }
    }
  }
  if (!identifierField) return null;

  return { identifierField, pivotField, periodKeys, metrics };
}

// ─────────────────────────────────────────────────────────────
// Pivot UI
// ─────────────────────────────────────────────────────────────
function renderPivotToolbar(pivotConfig) {
  const { identifierField, metrics } = pivotConfig;
  const { groups } = _structure;

  // Collect all user values across all groups
  const userSet = new Set();
  for (const group of groups) {
    for (const row of group.rows) {
      if (row[identifierField] !== undefined && row[identifierField] !== null) {
        userSet.add(String(row[identifierField]));
      }
    }
  }
  const users = [...userSet].sort((a, b) => a.localeCompare(b));

  const userSel = $('pivot-user-select');
  userSel.innerHTML = users.map(u => `<option value="${escHtml(u)}">${escHtml(u)}</option>`).join('');

  const metricSel = $('pivot-metric-select');
  metricSel.innerHTML = metrics.map(m => `<option value="${escHtml(m)}">${escHtml(m)}</option>`).join('');
}

function renderPivotTable(structure, pivotConfig, user, metric) {
  const { groups } = structure;
  const { identifierField, pivotField, periodKeys } = pivotConfig;

  // Build pivot data: only groups where user appears
  const pivotRows = [];
  for (const group of groups) {
    const matchingRow = group.rows.find(r => String(r[identifierField] ?? '') === user);
    if (!matchingRow) continue;
    const histObj = matchingRow[pivotField] || {};
    const vals = periodKeys.map(p => {
      const inner = histObj[p];
      return (inner && typeof inner === 'object' && typeof inner[metric] === 'number')
        ? inner[metric] : null;
    });
    const total = vals.reduce((s, v) => s + (v ?? 0), 0);
    pivotRows.push({ groupName: group.name, vals, total });
  }

  // Thead
  const thead = $('pivot-table-head');
  thead.innerHTML = '';
  const hrow = document.createElement('tr');
  hrow.innerHTML = `<th>Project</th>` +
    periodKeys.map(p => `<th class="col-num">${escHtml(p)}</th>`).join('') +
    `<th class="col-num">Total</th>`;
  thead.appendChild(hrow);

  // Tbody + totals
  const tbody = $('pivot-table-body');
  tbody.innerHTML = '';

  const colTotals = new Array(periodKeys.length).fill(0);
  let grandTotal = 0;

  for (const { groupName, vals, total } of pivotRows) {
    const tr = document.createElement('tr');
    let cells = `<td>${escHtml(groupName)}</td>`;
    vals.forEach((v, i) => {
      if (v !== null) {
        colTotals[i] += v;
        cells += `<td class="col-num">${fmt(v)}</td>`;
      } else {
        cells += `<td class="col-missing">—</td>`;
      }
    });
    grandTotal += total;
    cells += `<td class="col-total">${fmt(total)}</td>`;
    tr.innerHTML = cells;
    tbody.appendChild(tr);
  }

  // Totals row
  const totalsRow = document.createElement('tr');
  totalsRow.className = 'pivot-totals-row';
  let totalsCells = `<td>Totals</td>`;
  colTotals.forEach(v => { totalsCells += `<td class="col-num">${fmt(v)}</td>`; });
  totalsCells += `<td class="col-total">${fmt(grandTotal)}</td>`;
  totalsRow.innerHTML = totalsCells;
  tbody.appendChild(totalsRow);

  return { pivotRows, colTotals, grandTotal };
}

function renderPivotSidebar(pivotData, pivotConfig) {
  const { pivotRows, colTotals, grandTotal } = pivotData;
  const { periodKeys } = pivotConfig;
  const sidebar = $('stats-sidebar');

  let html = `<div>
    <div class="stats-section-title">Pivot Summary</div>
    <div class="stats-card">
      <div class="stats-row">
        <span class="stats-label">Grand total</span>
        <span class="stats-value">${fmt(grandTotal)}</span>
      </div>
      <div class="stats-row">
        <span class="stats-label">Projects with user</span>
        <span class="stats-value">${pivotRows.length}</span>
      </div>
    </div>
  </div>`;

  html += `<div><div class="stats-section-title">Period Totals</div><div class="stats-card">`;
  periodKeys.forEach((p, i) => {
    html += `<div class="stats-row">
      <span class="stats-label">${escHtml(p)}</span>
      <span class="stats-value">${fmt(colTotals[i])}</span>

  });
  html += `</div></div>`;

  sidebar.innerHTML = html;
}

// ─────────────────────────────────────────────────────────────
// Timeline Chart
// ─────────────────────────────────────────────────────────────
const CHART_COLORS = ['#818cf8','#34d399','#fbbf24','#f472b6','#2dd4bf','#fb923c','#a78bfa','#60a5fa','#f87171','#4ade80'];

function renderTimelineChart(structure, pivotConfig, user, metric) {
  const area = $('timeline-area');
  const sidebar = $('stats-sidebar');
  const { groups } = structure;
  const { identifierField, pivotField, periodKeys: rawPeriodKeys } = pivotConfig;
  const periodKeys = _periodReversed ? [...rawPeriodKeys].reverse() : rawPeriodKeys;

  // Update button label to reflect current order
  const orderLabel = $('btn-period-order-label');
  if (orderLabel) {
    orderLabel.textContent = `${periodKeys[0]} → ${periodKeys[periodKeys.length - 1]}`;
  }

  // Collect data: one series per group where user appears
  const series = [];
  for (const group of groups) {
    const matchRow = group.rows.find(r => String(r[identifierField] ?? '') === user);
    if (!matchRow) continue;
    const histObj = matchRow[pivotField] || {};
    const vals = periodKeys.map(p => {
      const v = (histObj[p] || {})[metric];
      return (v !== undefined && v !== null && !isNaN(Number(v))) ? Number(v) : null;
    });
    if (vals.every(v => v === null)) continue;
    series.push({ name: group.name, vals });
  }

  if (series.length === 0) {
    area.innerHTML = `<div style="color:var(--text-muted);padding:32px;text-align:center;">No data found for <strong style="color:var(--text-primary)">${escHtml(user)}</strong> in any project.</div>`;
    sidebar.innerHTML = '';
    return;
  }

  // Chart geometry
  const W = 700, H = 280;
  const PAD = { top: 20, right: 24, bottom: 40, left: 52 };
  const chartW = W - PAD.left - PAD.right;
  const chartH = H - PAD.top - PAD.bottom;
  const xStep  = periodKeys.length > 1 ? chartW / (periodKeys.length - 1) : chartW / 2;

  // Y scale
  const allVals = series.flatMap(s => s.vals).filter(v => v !== null);
  const yMin = 0;
  const yMax = Math.max(...allVals) * 1.15 || 10;

  function xPos(i) {
    return PAD.left + (periodKeys.length > 1 ? i * xStep : chartW / 2);
  }
  function yPos(v) {
    return PAD.top + chartH - ((v - yMin) / (yMax - yMin)) * chartH;
  }

  // Y grid lines (4 lines)
  let gridLines = '';
  let yLabels   = '';
  for (let t = 0; t <= 4; t++) {
    const val = yMin + (yMax - yMin) * (t / 4);
    const y   = yPos(val);
    gridLines += `<line class="timeline-grid" x1="${PAD.left}" y1="${y}" x2="${W - PAD.right}" y2="${y}"/>`;
    yLabels   += `<text class="timeline-axis-label" x="${PAD.left - 8}" y="${y + 4}" text-anchor="end">${fmt(val)}</text>`;
  }

  // X axis labels
  let xLabels = '';
  periodKeys.forEach((p, i) => {
    xLabels += `<text class="timeline-axis-label" x="${xPos(i)}" y="${H - PAD.bottom + 18}" text-anchor="middle">${escHtml(p)}</text>`;
  });

  // Lines + dots per series
  let linesHtml = '';
  let dotsHtml  = '';
  series.forEach((s, si) => {
    const color = CHART_COLORS[si % CHART_COLORS.length];
    // Build path (skip nulls with M/L segments)
    let d = '';
    let prev = null;
    s.vals.forEach((v, i) => {
      if (v === null) { prev = null; return; }
      const x = xPos(i), y = yPos(v);
      d += prev === null ? `M ${x} ${y}` : ` L ${x} ${y}`;
      prev = { x, y };
    });
    if (d) linesHtml += `<path class="timeline-line" d="${d}" stroke="${color}"/>`;
    s.vals.forEach((v, i) => {
      if (v === null) return;
      const x = xPos(i), y = yPos(v);
      dotsHtml += `<circle class="timeline-dot" cx="${x}" cy="${y}" fill="${color}"
        data-series="${escHtml(s.name)}" data-period="${escHtml(periodKeys[i])}" data-value="${v}"/>`;
    });
  });

  // Legend
  const legendHtml = series.map((s, si) => {
    const color = CHART_COLORS[si % CHART_COLORS.length];
    return `<div class="timeline-legend-item">
      <div class="timeline-legend-dot" style="background:${color}"></div>
      <span>${escHtml(s.name)}</span>
    </div>`;
  }).join('');

  area.innerHTML = `
    <div class="timeline-chart-wrap">
      <div class="timeline-chart-title">${escHtml(user)} · ${escHtml(metric)} over time</div>
      <svg class="timeline-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
        ${gridLines}${yLabels}${xLabels}${linesHtml}${dotsHtml}
      </svg>
      <div class="timeline-legend">${legendHtml}</div>
    </div>`;

  // Sidebar: per-period totals across all series
  const colTotals = periodKeys.map((_, i) => {
    const nums = series.map(s => s.vals[i]).filter(v => v !== null);
    return nums.length ? nums.reduce((a, b) => a + b, 0) : null;
  });
  const grandTotal = colTotals.filter(v => v !== null).reduce((a, b) => a + b, 0);

  let sbHtml = `<div class="sidebar-section">
    <div class="sidebar-section-title">Timeline Summary</div>
    <div class="stats-row"><span class="stats-label">Projects tracked</span><span class="stats-value">${series.length}</span></div>
    <div class="stats-row"><span class="stats-label">Grand total</span><span class="stats-value">${fmt(grandTotal)}</span></div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-section-title">By Period</div>
    ${periodKeys.map((p, i) => `<div class="stats-row"><span class="stats-label">${escHtml(p)}</span><span class="stats-value">${colTotals[i] !== null ? fmt(colTotals[i]) : '—'}</span></div>`).join('')}
  </div>`;
  sidebar.innerHTML = sbHtml;
}

// ─────────────────────────────────────────────────────────────
// Sorting
// ─────────────────────────────────────────────────────────────
function getSortedRows(rows) {
  if (!_sortCol) return rows;
  return [...rows].sort((a, b) => {
    const av = a[_sortCol] ?? '';
    const bv = b[_sortCol] ?? '';
    let cmp;
    if (typeof av === 'number' && typeof bv === 'number') {
      cmp = av - bv;
    } else {
      cmp = String(av).localeCompare(String(bv), undefined, { numeric: true });
    }
    return _sortDir === 'asc' ? cmp : -cmp;
  });
}

// ─────────────────────────────────────────────────────────────
// Table Rendering
// ─────────────────────────────────────────────────────────────
function renderTable(structure) {
  const { groups, columns, mode } = structure;
  const isGrouped = mode === 'grouped';

  // thead — with sort indicators
  const thead = $('table-head');
  thead.innerHTML = '';
  const visibleCols = columns.filter(c => !_hiddenCols.has(c.name));

  // Pre-compute column ranges for sparklines
  const colRanges = {};
  if (_sparklinesEnabled) {
    for (const col of visibleCols.filter(c => c.type === 'number')) {
      const vals = groups.flatMap(g => g.rows).map(r => r[col.name]).filter(v => typeof v === 'number');
      colRanges[col.name] = { min: Math.min(...vals), max: Math.max(...vals) };
    }
  }

  const hrow = document.createElement('tr');
  for (const col of visibleCols) {
    const th = document.createElement('th');
    if (col.type === 'number') th.classList.add('col-num');
    if (col.type !== 'nested') {
      th.classList.add('sortable');
      const isActive = _sortCol === col.name;
      th.innerHTML = `${escHtml(col.name)}<i class="sort-icon">${isActive ? (_sortDir === 'asc' ? '▲' : '▼') : '⇅'}</i>`;
      if (isActive) th.classList.add(_sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
      th.addEventListener('click', () => {
        if (_sortCol === col.name) {
          _sortClicks++;
          if (_sortClicks === 1) { _sortDir = 'desc'; }
          else { _sortCol = null; _sortClicks = 0; }
        } else {
          _sortCol = col.name; _sortDir = 'asc'; _sortClicks = 0;
        }
        rerender();
        pushViewState();
      });
    } else {
      th.textContent = col.name;
    }
    hrow.appendChild(th);
  }
  thead.appendChild(hrow);

  // tbody
  const tbody = $('table-body');
  tbody.innerHTML = ''; // clears keyboard-focused state naturally
  let rowIdx = 0;

  for (const group of groups) {
    // Group header row
    if (isGrouped && group.name !== null) {
      const groupRow = document.createElement('tr');
      groupRow.className = 'row-group';
      groupRow.dataset.group = group.name;
      groupRow.dataset.originalIndex = rowIdx++;

      const td = document.createElement('td');
      td.colSpan = visibleCols.length;
      td.innerHTML =
        `<div class="group-name">` +
        `<svg class="group-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>` +
        `<span>${escHtml(group.name)}</span>` +
        `<span class="group-badge" data-total="${group.rows.length}">${group.rows.length} rows</span>` +
        `</div>`;
      groupRow.appendChild(td);
      tbody.appendChild(groupRow);

      groupRow.addEventListener('click', () => {
        const isCollapsed = groupRow.classList.toggle('collapsed');
        groupRow.querySelector('.group-chevron').classList.toggle('collapsed', isCollapsed);
        const dataRows = tbody.querySelectorAll(`.row-data[data-group="${CSS.escape(group.name)}"]`);
        for (const r of dataRows) {
          if (isCollapsed) {
            r.dataset.collapsedByGroup = '1';
            r.classList.add('hidden');
          } else {
            delete r.dataset.collapsedByGroup;
            r.classList.remove('hidden'); // dimmed state is already set correctly
          }
        }
      });
    }

    // Data rows (sorted copy — never mutates original)
    for (const row of getSortedRows(group.rows)) {
      const tr = document.createElement('tr');
      tr.className = 'row-data';
      tr.dataset.originalIndex = rowIdx++;
      tr._rowData = row; // for CSV export + copy-row
      if (isGrouped && group.name !== null) tr.dataset.group = group.name;

      for (const col of visibleCols) {
        const td = document.createElement('td');
        const val = row[col.name];
        if (col.type === 'nested' && val && typeof val === 'object') {
          td.dataset.raw = '';
          td.dataset.nestedCol = col.name;
          td.dataset.nestedJson = JSON.stringify(val);
          const badge = document.createElement('button');
          badge.className = 'nested-badge';
          badge.innerHTML =
            `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>` +
            escHtml(col.name);
          td.appendChild(badge);
        } else {
          if (col.type === 'number') td.classList.add('col-num');
          const raw = (val !== undefined && val !== null) ? String(val) : '';
          td.dataset.raw = raw;
          if (col.type === 'number' && _sparklinesEnabled && colRanges[col.name] && raw !== '') {
            const { min, max } = colRanges[col.name];
            const t = max > min ? (Number(val) - min) / (max - min) : 1;
            const pct = Math.round(t * 100);
            td.innerHTML = `<div class="spark-wrap"><span>${escHtml(raw)}</span><div class="spark-track"><div class="spark-fill" style="width:${pct}%"></div></div></div>`;
          } else {
            td.textContent = raw;
          }
        }
        tr.appendChild(td);
      }
      // Copy-row button in last td
      if (tr.lastChild) {
        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-row-btn';
        copyBtn.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
        tr.lastChild.appendChild(copyBtn);
      }
      tbody.appendChild(tr);
    }
  }
}

// ─────────────────────────────────────────────────────────────
// Highlight
// ─────────────────────────────────────────────────────────────
function highlightText(text, term) {
  if (!term || !text) return escHtml(text);
  const lowerText = text.toLowerCase();
  const lowerTerm = term.toLowerCase();
  let result = '';
  let idx = 0;
  while (idx < text.length) {
    const found = lowerText.indexOf(lowerTerm, idx);
    if (found === -1) { result += escHtml(text.slice(idx)); break; }
    result += escHtml(text.slice(idx, found));
    result += `<mark>${escHtml(text.slice(found, found + term.length))}</mark>`;
    idx = found + term.length;
  }
  return result;
}

function highlightRegex(text, re) {
  if (!text) return '';
  let result = '', lastIndex = 0, m;
  re.lastIndex = 0;
  while ((m = re.exec(text)) !== null) {
    result += escHtml(text.slice(lastIndex, m.index));
    result += `<mark>${escHtml(m[0])}</mark>`;
    lastIndex = m.index + m[0].length;
    if (m[0].length === 0) re.lastIndex++; // prevent infinite loop on zero-width match
  }
  return result + escHtml(text.slice(lastIndex));
}

// ─────────────────────────────────────────────────────────────
// Filter
// ─────────────────────────────────────────────────────────────
function applyFilter(term) {
  const tbody = $('table-body');
  const raw   = term.trim();
  const lower = raw.toLowerCase();
  const searchEl = $('search-input');

  // Build regex (regex mode) or use plain string
  let regex = null;
  if (_regexSearch && raw) {
    try {
      regex = new RegExp(raw, 'gi');
      searchEl.classList.remove('regex-invalid');
    } catch (e) {
      searchEl.classList.add('regex-invalid');
      return; // invalid pattern — don't filter
    }
  } else {
    searchEl.classList.remove('regex-invalid');
  }

  const groupMatchCount = {}; // groupKey → count
  let totalMatches = 0;

  // Step 1: evaluate each visible data row — dim non-matches, highlight matches
  const dataRows = [...tbody.querySelectorAll('.row-data')];
  for (const tr of dataRows) {
    if (tr.dataset.collapsedByGroup) { tr.dataset.matchResult = '0'; continue; }

    const tds = tr.querySelectorAll('td');
    let matches = !raw;
    if (raw) {
      for (const td of tds) {
        const cellRaw = td.dataset.raw;
        if (_regexSearch && regex) {
          regex.lastIndex = 0;
          if (regex.test(cellRaw)) { matches = true; break; }
        } else {
          if (cellRaw.toLowerCase().includes(lower)) { matches = true; break; }
        }
      }
    }

    const groupKey = tr.dataset.group || '__flat__';
    if (!groupMatchCount[groupKey]) groupMatchCount[groupKey] = 0;
    if (matches) { groupMatchCount[groupKey]++; totalMatches++; }

    tr.dataset.matchResult = matches ? '1' : '0';
    tr.classList.toggle('hidden', !matches && !!raw);
    tr.classList.remove('dimmed');

    for (const td of tds) {
      if (td.dataset.nestedCol) continue; // preserve nested badges
      if (raw && matches) {
        td.innerHTML = _regexSearch && regex
          ? highlightRegex(td.dataset.raw, new RegExp(raw, 'gi'))
          : highlightText(td.dataset.raw, lower);
      } else {
        td.innerHTML = escHtml(td.dataset.raw);
      }
    }
  }

  // Step 2: reorder DOM — matching groups first, matching rows first within each group
  if (lower) {
    const sections = _structure.groups.map(group => {
      const gname = group.name;
      const groupRow = gname !== null
        ? tbody.querySelector(`.row-group[data-group="${CSS.escape(gname)}"]`)
        : null;
      const rows = [...tbody.querySelectorAll(
        gname !== null ? `.row-data[data-group="${CSS.escape(gname)}"]` : '.row-data:not([data-group])'
      )];
      return { gname, groupRow, rows };
    });

    // Groups with at least one match float to top; ties preserve original order
    sections.sort((a, b) => {
      const aHas = (groupMatchCount[a.gname || '__flat__'] || 0) > 0 ? 0 : 1;
      const bHas = (groupMatchCount[b.gname || '__flat__'] || 0) > 0 ? 0 : 1;
      return aHas - bHas;
    });

    const frag = document.createDocumentFragment();
    for (const { groupRow, rows } of sections) {
      if (groupRow) frag.appendChild(groupRow);
      const matching    = rows.filter(r => r.dataset.matchResult === '1');
      const nonMatching = rows.filter(r => r.dataset.matchResult !== '1');
      for (const r of [...matching, ...nonMatching]) frag.appendChild(r);
    }
    tbody.innerHTML = '';
    tbody.appendChild(frag);
  } else {
    // Restore original insertion order
    const allRows = [...tbody.querySelectorAll('tr')];
    allRows.sort((a, b) => +a.dataset.originalIndex - +b.dataset.originalIndex);
    const frag = document.createDocumentFragment();
    for (const r of allRows) frag.appendChild(r);
    tbody.innerHTML = '';
    tbody.appendChild(frag);
  }

  // Step 3: update group header badges and dim groups with zero matches
  for (const groupRow of tbody.querySelectorAll('.row-group')) {
    const gname = groupRow.dataset.group;
    const count = groupMatchCount[gname] || 0;
    const total = +groupRow.querySelector('.group-badge').dataset.total;
    const badge = groupRow.querySelector('.group-badge');
    badge.textContent = lower ? `${count} match${count !== 1 ? 'es' : ''}` : `${total} rows`;
    groupRow.classList.toggle('hidden', !!lower && count === 0);
    groupRow.classList.remove('group-dimmed');
  }

  // Match count chip
  const matchCountEl = $('match-count');
  if (!lower) {
    matchCountEl.textContent = '';
    matchCountEl.className = 'match-count';
  } else {
    matchCountEl.textContent = `${totalMatches} match${totalMatches !== 1 ? 'es' : ''}`;
    matchCountEl.className = 'match-count has-matches';
  }

  renderStats(lower, groupMatchCount);
}

// ─────────────────────────────────────────────────────────────
// Stats Sidebar
// ─────────────────────────────────────────────────────────────
function renderStats(lower, groupMatchCount) {
  const sidebar = $('stats-sidebar');
  const { groups, columns, mode } = _structure;

  // Collect matched rows
  const matchedRows = [];
  for (const group of groups) {
    for (const row of group.rows) {
      if (!lower) {
        matchedRows.push(row);
      } else {
        const vals = Object.values(row).map(v =>
          (v !== null && v !== undefined) ? String(v).toLowerCase() : ''
        );
        if (vals.some(v => v.includes(lower))) matchedRows.push(row);
      }
    }
  }

  const numCols = columns.filter(c => c.type === 'number');
  let html = '';

  // Summary card
  const totalRows = groups.reduce((s, g) => s + g.rows.length, 0);
  html += `<div>
    <div class="stats-section-title">Summary</div>
    <div class="stats-card">
      <div class="stats-row">
        <span class="stats-label">Matching rows</span>
        <span class="stats-value">${matchedRows.length}</span>
      </div>
      <div class="stats-row">
        <span class="stats-label">Total rows</span>
        <span class="stats-value">${totalRows}</span>
      </div>
    </div>
  </div>`;

  // Numeric column stats
  if (numCols.length > 0) {
    html += `<div><div class="stats-section-title">Numeric Columns</div>`;
    for (const col of numCols) {
      const vals = matchedRows
        .map(r => r[col.name])
        .filter(v => v !== null && v !== undefined && typeof v === 'number');
      if (vals.length === 0) continue;

      const sum = vals.reduce((a, b) => a + b, 0);
      const avg = sum / vals.length;
      const min = Math.min(...vals);
      const max = Math.max(...vals);

      html += `<div class="stats-card">
        <div class="stats-col-name">${escHtml(col.name)}</div>
        <div class="stats-row"><span class="stats-label">Sum</span><span class="stats-value">${fmt(sum)}</span></div>
        <div class="stats-row"><span class="stats-label">Avg</span><span class="stats-value">${fmt(avg)}</span></div>
        <div class="stats-row"><span class="stats-label">Min</span><span class="stats-value">${fmt(min)}</span></div>
        <div class="stats-row"><span class="stats-label">Max</span><span class="stats-value">${fmt(max)}</span></div>
        <div class="stats-row"><span class="stats-label">Count</span><span class="stats-value">${vals.length}</span></div>`;

      // 100% indicator for percentage columns
      const colLower = col.name.toLowerCase();
      if (colLower.includes('percent') || colLower.includes('%')) {
        const diff = Math.round((100 - sum) * 10) / 10;
        const rounded = Math.round(sum * 10) / 10;
        if (Math.abs(sum - 100) < 0.05) {
          html += `<div class="percent-indicator percent-ok">✓ Sums to 100%</div>`;
        } else if (sum < 100) {
          html += `<div class="percent-indicator percent-low">⚠ Needs ${diff} more (${rounded}%)</div>`;
        } else {
          html += `<div class="percent-indicator percent-hi">⚠ Over by ${Math.abs(diff)} (${rounded}%)</div>`;
        }
      }

      html += `</div>`;
    }
    html += `</div>`;
  }

  // Groups breakdown
  if (mode === 'grouped') {
    html += `<div><div class="stats-section-title">Groups</div><div class="stats-card"><div>`;
    for (const group of groups) {
      const count = lower ? (groupMatchCount[group.name] || 0) : group.rows.length;
      html += `<div class="group-stat-row">
        <span class="group-stat-name">${escHtml(group.name)}</span>
        <span class="group-stat-count">${count}</span>
      </div>`;
    }
    html += `</div></div></div>`;
  }

  sidebar.innerHTML = html;
}

// ─────────────────────────────────────────────────────────────
// Load & View Transition
// ─────────────────────────────────────────────────────────────
function loadJSON(text) {
  const errEl = $('error-msg');
  errEl.classList.remove('visible');

  let parsed;
  try {
    parsed = JSON.parse(text);
  } catch (e) {
    errEl.textContent = 'Invalid JSON: ' + e.message;
    errEl.classList.add('visible');
    return;
  }

  try {
    _structure = detectStructure(parsed);
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.add('visible');
    return;
  }

  resetViewerState();

  // Detect pivot eligibility
  _pivotConfig = detectPivotConfig(parsed);
  const btnPivot = $('btn-pivot');
  if (_pivotConfig) {
    btnPivot.classList.remove('hidden-el');
    renderPivotToolbar(_pivotConfig);
  } else {
    btnPivot.classList.add('hidden-el');
  }

  renderTable(_structure);
  buildFilterBar();
  updateFilterBadge();
  $('search-input').value = '';
  applyFilter('');

  // Switch views
  $('view-input').style.display = 'none';
  $('view-viewer').classList.add('active');
  $('btn-new-json').classList.remove('hidden-el');
  $('btn-collapse-all').classList.remove('hidden-el');
  $('btn-export-csv').classList.remove('hidden-el');
  $('btn-sparklines').classList.remove('hidden-el');
  $('btn-heat').classList.remove('hidden-el');
  $('btn-columns').classList.remove('hidden-el');

  // Apply pending URL state then save JSON to session
  if (_pendingState) { applyViewState(_pendingState); _pendingState = null; }
  try { sessionStorage.setItem('viewer-session-json', text); } catch (e) {}
}

function csvCell(val) {
  const s = (val === null || val === undefined) ? '' :
            (typeof val === 'object' ? JSON.stringify(val) : String(val));
  return s.includes(',') || s.includes('"') || s.includes('\n')
    ? '"' + s.replace(/"/g, '""') + '"'
    : s;
}
$('btn-export-csv').addEventListener('click', () => {
  const { groups, columns, mode } = _structure;
  const visibleCols = columns.filter(c => !_hiddenCols.has(c.name));
  const isGrouped = mode === 'grouped';
  const tbody = $('table-body');

  const headers = (isGrouped ? ['Group'] : []).concat(visibleCols.map(c => c.name));
  const rows = [headers.join(',')];

  for (const group of groups) {
    for (const row of getSortedRows(group.rows)) {
      // Check if this row's tr is visible in the DOM
      const tr = [...tbody.querySelectorAll('.row-data')].find(
        t => t.dataset.group === (group.name || '') && t._rowData === row
      );
      if (tr && tr.classList.contains('hidden')) continue;
      const cells = (isGrouped ? [csvCell(group.name)] : [])
        .concat(visibleCols.map(c => csvCell(row[c.name])));
      rows.push(cells.join(','));
    }
  }

  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'export.csv'; a.click();
  URL.revokeObjectURL(url);
});

function buildColsDropdown() {

}

// ─────────────────────────────────────────────────────────────
// Heat map
// ─────────────────────────────────────────────────────────────
function applyHeatMap() {
  if (!_structure) return;
  const { columns, groups } = _structure;
  const numCols = columns.filter(c => c.type === 'number' && !_hiddenCols.has(c.name));
  const visibleCols = columns.filter(c => !_hiddenCols.has(c.name));

  // Compute min/max per numeric column from all rows
  const colStats = {};
  for (const col of numCols) {
    const vals = groups.flatMap(g => g.rows).map(r => r[col.name]).filter(v => typeof v === 'number');
    colStats[col.name] = { min: Math.min(...vals), max: Math.max(...vals) };
  }

  const tbody = $('table-body');
  for (const tr of tbody.querySelectorAll('.row-data')) {
    const tds = tr.querySelectorAll('td');
    visibleCols.forEach((col, i) => {
      if (col.type !== 'number') return;
      const td = tds[i];
      if (!td) return;
      const raw = parseFloat(td.dataset.raw);
      const { min, max } = colStats[col.name] || {};
      if (max === min || isNaN(raw)) { td.classList.remove('heat-cell'); return; }
      const t = (raw - min) / (max - min);
      // Cool (blue-ish) → warm (red-ish)
      const r = Math.round(t * 220 + (1 - t) * 30);
      const g = Math.round((1 - Math.abs(t - 0.5) * 2) * 80);
      const b = Math.round((1 - t) * 200 + t * 40);
      td.classList.add('heat-cell');
      td.style.backgroundColor = `rgba(${r},${g},${b},${0.12 + t * 0.28})`;
    });
  }
}

function clearHeatMap() {
  for (const td of document.querySelectorAll('td.heat-cell')) {
    td.classList.remove('heat-cell');
    td.style.backgroundColor = '';
  }
}

function updateFilterBadge() {

  if (count === 0) { badge.classList.add('hidden-el'); return; }
  badge.textContent = `${count} filter${count > 1 ? 's' : ''} ×`;
  badge.classList.remove('hidden-el');
}

function buildFilterBar() {
  const bar = $('filter-bar');
  if (!_structure) return;
  const { columns, groups } = _structure;
  const strCols = columns.filter(c => c.type === 'string' && !_hiddenCols.has(c.name));
  if (strCols.length === 0) { bar.classList.add('hidden-el'); return; }

  bar.innerHTML = `<span class="filter-bar-label">Filter</span>`;

  for (const col of strCols) {
    const values = [...new Set(groups.flatMap(g => g.rows).map(r => String(r[col.name] ?? '')).filter(Boolean))].sort();
    if (values.length < 2 || values.length > 20) continue; // skip low-cardinality or huge columns

    const active = _colFilters[col.name] || new Set();
    const group = document.createElement('div');
    group.className = 'filter-group';
    group.innerHTML = `<span class="filter-group-name">${escHtml(col.name)}</span>`;

    for (const val of values) {
      const chip = document.createElement('span');
      chip.className = 'filter-chip' + (active.has(val) ? ' active' : '');
      chip.textContent = val;
      chip.dataset.col = col.name;
      chip.dataset.val = val;
      group.appendChild(chip);
    }

    if (active.size > 0) {
      const clr = document.createElement('span');
      clr.className = 'filter-clear';
      clr.textContent = '✕';
      clr.dataset.clearCol = col.name;
      group.appendChild(clr);
    }
    bar.appendChild(group);
  }

  const hasGroups = bar.querySelectorAll('.filter-group').length > 0;
  bar.classList.toggle('hidden-el', !hasGroups);
}

function applyColFilters() {
  const tbody = $('table-body');
  const hasFilters = Object.values(_colFilters).some(s => s.size > 0);
  for (const tr of tbody.querySelectorAll('.row-data')) {
    if (tr.dataset.collapsedByGroup) continue;
    if (!hasFilters) { tr.classList.remove('hidden'); continue; }
    const row = tr._rowData;
    if (!row) continue;
    let pass = true;
    for (const [col, vals] of Object.entries(_colFilters)) {
      if (vals.size === 0) continue;
      if (!vals.has(String(row[col] ?? ''))) { pass = false; break; }
    }
    tr.classList.toggle('hidden', !pass);
  }
}

$('filter-bar').addEventListener('click', (e) => {
  const chip = e.target.closest('.filter-chip');
  if (chip) {
    const { col, val } = chip.dataset;
    if (!_colFilters[col]) _colFilters[col] = new Set();
    if (_colFilters[col].has(val)) _colFilters[col].delete(val);
    else _colFilters[col].add(val);
    buildFilterBar(); applyColFilters(); updateFilterBadge();
    if (_heatMapEnabled) applyHeatMap();
    return;
  }
  const clrBtn = e.target.closest('[data-clear-col]');
  if (clrBtn) {
    delete _colFilters[clrBtn.dataset.clearCol];
    buildFilterBar(); applyColFilters(); updateFilterBadge();
    if (_heatMapEnabled) applyHeatMap();
  }
});
