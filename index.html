<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Studio — Visual JSON Builder</title>
  <meta name="description" content="Drag typed blocks to build JSON visually. Edit keys and values inline, preview with syntax highlighting, then export">
  <meta property="og:title" content="JSON Studio — Visual JSON Builder">
  <meta property="og:description" content="Drag typed blocks to build JSON visually. Edit inline, preview live, import or export.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://jsonstudio.neorgon.com/">
  <meta property="og:site_name" content="Neorgon">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="JSON Studio — Visual JSON Builder">
  <meta name="twitter:description" content="Drag typed blocks to build JSON visually. Edit inline, preview live, import or export.">
  <meta name="twitter:image" content="https://jsonstudio.neorgon.com/og-preview.jpg">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://jsonstudio.neorgon.com/">
  <meta property="og:locale" content="en_US">
  <meta name="theme-color" content="#040714">
  <meta property="og:image" content="https://jsonstudio.neorgon.com/og-preview.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="stylesheet" href="css/style.css">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "JSON Studio",
  "description": "Drag blocks to build JSON visually. Edit inline and preview with syntax highlighting.",
  "url": "https://jsonstudio.neorgon.com/",
  "applicationCategory": "DeveloperApplication",
  "operatingSystem": "Any",
  "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
  "author": { "@type": "Organization", "name": "Neorgon", "url": "https://neorgon.com/" }
}
</script>
</head>
<body>

<a class="skip-link" href="#main">Skip to content</a>
<header class="header-bar">
  <div class="header-logo">
    <a href="https://ehq.cl/" target="_blank" rel="noopener noreferrer"><img src="energon-classic-logo.png" class="header-logo-img" alt="Neorgon"></a>
    <div>
      <h1>JSON Studio</h1>
      <div class="header-subtitle">Drag blocks, edit values, export clean JSON</div>
    </div>
  </div>
  <div class="header-nav">
    <a href="viewer/" class="header-nav-link">JSON Viewer</a>
    <a href="https://neorgon.com/" class="header-home" title="neorgon.com" aria-label="Neorgon home" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </a>
  </div>
</header>

<div class="workspace" id="main">

  <!-- Palette -->
  <aside class="palette">
    <div class="palette-title">Blocks</div>
    <div class="palette-block" draggable="true" data-type="object">
      <span class="type-dot c-object"></span>
      <span>Object</span>
      <span class="palette-mono">{}</span>
    </div>
    <div class="palette-block" draggable="true" data-type="array">
      <span class="type-dot c-array"></span>
      <span>Array</span>
      <span class="palette-mono">[]</span>
    </div>
    <div class="palette-block" draggable="true" data-type="string">
      <span class="type-dot c-string"></span>
      <span>String</span>
      <span class="palette-mono">"a"</span>
    </div>
    <div class="palette-block" draggable="true" data-type="number">
      <span class="type-dot c-number"></span>
      <span>Number</span>
      <span class="palette-mono">123</span>
    </div>
    <div class="palette-block" draggable="true" data-type="boolean">
      <span class="type-dot c-boolean"></span>
      <span>Boolean</span>
      <span class="palette-mono">t/f</span>
    </div>
    <div class="palette-block" draggable="true" data-type="null">
      <span class="type-dot c-null"></span>
      <span>Null</span>
      <span class="palette-mono">&#8709;</span>
    </div>
  </aside>

  <!-- Canvas -->
  <main class="canvas">
    <div class="canvas-header">
      <span class="canvas-title">Structure</span>
      <div class="root-toggle-group">
        <button class="root-type-btn active" id="btn-obj" onclick="setRootType('object')">{ } Object</button>
        <button class="root-type-btn" id="btn-arr" onclick="setRootType('array')">[ ] Array</button>
      </div>
      <button class="icon-btn" onclick="triggerImport()">Import JSON</button>
      <input type="file" id="file-import" accept=".json,application/json" style="display:none">
      <button class="icon-btn" onclick="clearCanvas()">Clear</button>
      <button id="json-toggle-btn" class="icon-btn" onclick="toggleJSONPanel()" style="display:none;margin-left:auto">Show JSON</button>
    </div>
    <div class="canvas-scroll" id="canvas-scroll">
      <div id="tree-root"></div>
    </div>
  </main>

  <!-- JSON Output -->
  <aside class="json-panel">
    <div class="json-panel-header">
      <span class="json-panel-title">JSON Output</span>
      <div class="json-actions">
        <button class="icon-btn" id="edit-toggle-btn" onclick="toggleEditMode()">Edit</button>
        <button class="icon-btn" id="copy-btn" onclick="copyJSON()">Copy</button>
        <button class="icon-btn" onclick="downloadJSON()">Download</button>
      </div>
    </div>
    <!-- View mode -->
    <div class="json-output" id="json-view">
      <pre id="json-output"></pre>
    </div>
    <!-- Edit mode -->
    <div class="json-output" id="json-edit" style="display:none">
      <textarea id="json-textarea" class="json-textarea" spellcheck="false"></textarea>
    </div>
    <div class="json-edit-footer" id="json-edit-footer" style="display:none">
      <span class="json-error" id="json-error"></span>
      <button class="apply-btn" onclick="applyJSON()">Apply &#8594;</button>
    </div>
  </aside>

</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
